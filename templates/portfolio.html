<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Dashboard</title>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- LOCAL Select2 -->
    <link href="{{ url_for('static', filename='select2/select2.min.css') }}" rel="stylesheet" />
    <script src="{{ url_for('static', filename='select2/select2.min.js') }}"></script>
    
</head>

<body>

    <h2>Other Portfolio Details</h2>
    <form method="POST" action="/create-portfolio">
        <input type="text" name="name" placeholder="Portfolio Name" required>
        <button type="submit">Create</button>
    </form>
        <form method="POST" action="/add-holding">
        <select name="portfolio_id">
            {% for p in portfolios %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
        </select>

        <select id="symbol-dropdown" name="symbol" required></select>
        <input type="number" step="any" name="quantity" placeholder="Qty" required>
        <input type="number" step="any" name="buy_price" placeholder="Buy Price" required>

        <button type="submit">Add</button>
    </form>
    {% for p in portfolios %}
        <h3>
            {{ p.name }}
            <a href="/delete-portfolio/{{ p.id }}">❌ Delete</a>
        </h3>

        <table border="1">
            <tr>
                <th>Symbol</th>
                <th>Qty</th>
                <th>Buy Price</th>
                <th>Action</th>
            </tr>

            {% for h in p.holdings %}
            <tr>
                <td>{{ h[2] }}</td>
                <td>{{ h[3] }}</td>
                <td>{{ h[4] }}</td>
                <td>
                    <!-- <a href="/edit-holding/{{ h[0] }}">Edit</a> | -->
                    <a href="/delete-holding/{{ h[0] }}">Delete</a>
                </td>   
            </tr>
            {% endfor %}
        </table>
    {% endfor %}
    <h2>Portfolio Dashboard</h2>

    <h3>Total P&L: 
        <span id="total-pnl" style="font-weight:bold;"></span>
    </h3>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Type</th>
                <th>Side</th>
                <th>Qty</th>
                <th>Avg Price</th>
                <th>LTP</th>
                <th>P&L</th>
                <th>P&L %</th>
            </tr>
        </thead>
        <tbody id="portfolio-body"></tbody>
    </table>

</body>
<script>
function fetchData() {
    fetch('/portfolio-data')
    .then(res => res.json())
    .then(data => {
        let tbody = document.getElementById("portfolio-body");
        tbody.innerHTML = "";

        data.positions.forEach(p => {
            let row = `
                <tr>
                    <td>${p.tradingsymbol}</td>
                    <td>${p.type}</td>
                    <td>${p.side}</td>
                    <td>${p.quantity}</td>
                    <td>${(p.average_price || 0).toFixed(2)}</td>
                    <td>${p.ltp}</td>
                    <td style="color:${p.pnl > 0 ? 'green' : 'red'}">
                        ${p.pnl.toFixed(2)}
                    </td>
                    <td style="color:${p.pnl_percent > 0 ? 'green' : 'red'}">
                        ${p.pnl_percent.toFixed(2)}%
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        document.getElementById("total-pnl").innerHTML =
            data.total_pnl.toFixed(2);
    });
}

setInterval(fetchData, 3000);
</script>
<script>
function loadSymbols() {
    fetch('/get-symbols')
    .then(res => {
        if (!res.ok) throw new Error("API error");
        return res.json();
    })
    .then(data => {
        let dropdown = document.getElementById("symbol-dropdown");
        dropdown.innerHTML = "";  // clear

        data.forEach(s => {
            let option = document.createElement("option");
            option.value = s.symbol;
            option.text = `${s.symbol} (${s.exchange})`;
            dropdown.appendChild(option);
        });

        // ✅ Initialize Select2 AFTER data is loaded
        $('#symbol-dropdown').select2({
            placeholder: "Search symbol",
            width: '250px'
        });
    });
}

window.onload = function() {
    fetchData();
    loadSymbols();
}

</script>
</html>
