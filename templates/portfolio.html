<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Dashboard</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Select2 -->
    <link href="{{ url_for('static', filename='select2/select2.min.css') }}" rel="stylesheet" />
    <script src="{{ url_for('static', filename='select2/select2.min.js') }}"></script>
</head>

<body>

<!-- ===================== MANUAL ENTRY ===================== -->
<h2>📁 Manual Portfolio</h2>

<form method="POST" action="/create-portfolio">
    <input type="text" name="name" placeholder="Portfolio Name" required>
    <button type="submit">Create</button>
</form>

<form id="add-form">
    <select name="portfolio_id">
        {% for p in portfolios %}
        <option value="{{ p.id }}">{{ p.name }}</option>
        {% endfor %}
    </select>

    <select id="symbolSelect-dropdown" name="symbol" required style="width:250px;"></select>

    <input type="number" step="any" name="quantity" placeholder="Qty" required>
    <input type="number" step="any" name="buy_price" placeholder="Buy Price" required>

    <button type="submit">Add</button>
</form>

<!-- 🔥 Manual Portfolio Tables -->
<div id="manual-container"></div>

<hr>

<!-- ===================== ZERODHA ===================== -->
<h2>📊 Zerodha Positions</h2>

<h3>Total P&L: 
    <span id="zerodha-pnl"></span>
</h3>
<div id="zerodha-summary"></div>
<table border="1" width="100%">
    <thead>
        <tr>
            <th>Symbol</th>
            <th>Type</th>
            <th>Side</th>
            <th>Qty</th>
            <th>Lots</th>
            <th>Avg</th>
            <th>LTP</th>
            <th>P&L</th>
            <th>P&L %</th>
            <th>Invested</th>
            <th>Present</th>
            <th>Allocation %</th>
        </tr>
    </thead>
    <tbody id="zerodha-body"></tbody>
</table>

<hr>

<!-- ===================== COMBINED PORTFOLIO ===================== -->
<h2>📊 Combined Portfolio (Merged Holdings)</h2>

<h3>
    Total P&L:
    <span id="combined-pnl" style="font-weight:bold;"></span>
</h3>

<table border="1" width="100%" cellspacing="0" cellpadding="6">
    <thead style="background:#222;color:white;">
        <tr>
            <th>Symbol</th>
            <th>Total Qty</th>
            <th>Lots</th>
            <th>Avg Price</th>
            <th>LTP</th>
            <th>P&L</th>
            <th>P&L %</th>
            <th>Analysis</th>
            <th>Invested</th>
            <th>Present</th>
            <th>Allocation %</th>
        </tr>
    </thead>

    <tbody id="combined-body"></tbody>
</table>

</body>

<script>
/* ===================== ZERODHA ===================== */
function fetchZerodha(data) {

    let tbody = document.getElementById("zerodha-body");
    tbody.innerHTML = "";

    let total = 0;
    let invested = 0;
    let present = 0;
    let total_qty = 0;
    let total_pos = 0;

    data.positions
    .filter(p => p.source === "zerodha")
    .forEach(p => {

        total += p.pnl;

        let row = `
            <tr>
                <td>${p.tradingsymbol}</td>
                <td>${p.type}</td>
                <td>${p.side}</td>
                <td>${p.quantity}</td>
                <td>${p.lots}</td>
                <td>${(p.average_price || 0).toFixed(2)}</td>
                <td>${p.ltp}</td>
                <td style="color:${p.pnl > 0 ? 'green':'red'}">${p.pnl.toFixed(2)}</td>
                <td style="color:${p.pnl_percent > 0 ? 'green':'red'}">${p.pnl_percent.toFixed(2)}%</td>
                <td>${p.invested_value.toFixed(2)}</td>
                <td>${p.present_value.toFixed(2)}</td>
                <td>${p.allocation_percent.toFixed(2)}%</td>
            </tr>
        `;

        tbody.innerHTML += row;
        invested += p.invested_value;
        present += p.present_value;
        total_qty += Math.abs(p.quantity);
        total_pos+=1;
    });
    
    document.getElementById("zerodha-pnl").innerHTML = total.toFixed(2);
    document.getElementById("zerodha-summary").innerHTML = `
        <b>Total Invested:</b> ₹${invested.toFixed(2)}
        &nbsp;&nbsp;
        <b>Present Value:</b> ₹${present.toFixed(2)}
        &nbsp;&nbsp;
        <b>Total Positions:</b> ${total_pos}
    `;
}


/* ===================== MANUAL ===================== */
function fetchManual(data) {

    let container =
        document.getElementById("manual-container");

    container.innerHTML = "";

    data.manual_portfolios.forEach(p => {

        let html = `
            <h3>${p.name}</h3>
            <div style="margin:10px 0;padding:10px;background:#f5f5f5;">
                <b>Invested:</b> ₹${p.summary.invested.toFixed(2)}
                &nbsp;&nbsp;
                <b>Present:</b> ₹${p.summary.present.toFixed(2)}
                &nbsp;&nbsp;
                <b>P&L:</b> ₹${p.summary.pnl.toFixed(2)}
                &nbsp;&nbsp;
                <b>Positions:</b> ${p.summary.total_positions}
            </div>
            <table border="1" width="100%">
            <tr>
                <th>Symbol</th>
                <th>Qty</th>
                <th>Lots</th>
                <th>Buy</th>
                <th>LTP</th>
                <th>P&L</th>
                <th>P&L %</th>
                <th>Invested</th>
                <th>Present</th>
                <th>Allocation %</th>
                <th>Action</th>
            </tr>
        `;

        p.holdings.forEach(h => {
            html += `
                <tr>
                    <td>${h.tradingsymbol}</td>
                    <td>${h.quantity}</td>
                    <td>${h.lots}</td>
                    <td>${h.average_price.toFixed(2)}</td>
                    <td>${h.ltp.toFixed(2)}</td>
                    <td style="color:${h.pnl > 0 ? 'green':'red'}">${h.pnl.toFixed(2)}</td>
                    <td style="color:${h.pnl_percent > 0 ? 'green':'red'}">${h.pnl_percent.toFixed(2)}%</td>
                    <td>${h.invested_value.toFixed(2)}</td>
                    <td>${h.present_value.toFixed(2)}</td>
                    <td>${h.allocation_percent.toFixed(2)}%</td>
                    <td><button onclick="deleteHolding(${h.id})">Delete</button></td>
                </tr>
            `;
        });

        html += `</table>`;
        container.innerHTML += html;
    
    });
}


/* ===================== COMBINED ===================== */
/* ===================== COMBINED ===================== */
function fetchCombined(data) {

    let tbody = document.getElementById("combined-body");
    tbody.innerHTML = "";

    let total = 0;

    data.combined.forEach(p => {

        total += p.pnl;

        // 🔥 Row highlight
        let rowColor = "";

        if (p.pnl_percent >= 5) {
            rowColor = "#d4edda";   // strong green
        }
        else if (p.pnl_percent > 0) {
            rowColor = "#f1f8e9";   // light green
        }
        else if (p.pnl_percent <= -5) {
            rowColor = "#f8d7da";   // strong red
        }
        else {
            rowColor = "#fff3cd";   // yellow
        }

        // 🔥 Analysis
        let analysis = "";

        if (p.pnl_percent >= 10) {
            analysis = "🔥 Strong Profit";
        }
        else if (p.pnl_percent >= 5) {
            analysis = "✅ Bullish";
        }
        else if (p.pnl_percent > 0) {
            analysis = "📈 Positive";
        }
        else if (p.pnl_percent <= -10) {
            analysis = "⚠ Heavy Loss";
        }
        else if (p.pnl_percent < 0) {
            analysis = "🔻 Weak";
        }
        else {
            analysis = "➖ Neutral";
        }

        let row = `
            <tr style="background:${rowColor}">
                <td>
                    <b style="
                        color:${p.highlight ? '#1976d2' : 'black'};
                    ">
                        ${p.tradingsymbol}
                    </b>
                </td>
                <td>${p.quantity}</td>
                <td>${p.lots}</td>
                <td>${p.average_price.toFixed(2)}</td>
                <td>${p.ltp}</td>
                <td style="color:${p.pnl > 0 ? 'green':'red'};font-weight:bold;">${p.pnl.toFixed(2)}</td>
                <td style="color:${p.pnl_percent > 0 ? 'green':'red'};font-weight:bold;">${p.pnl_percent.toFixed(2)}%</td>
                <td>${analysis}</td>
                <td>${p.invested_value.toFixed(2)}</td>
                <td>${p.present_value.toFixed(2)}</td>
                <td>${p.allocation_percent.toFixed(2)}%</td>
            </tr>
        `;

        tbody.innerHTML += row;
    });

    document.getElementById("combined-pnl").innerHTML =
        total.toFixed(2);
}


/* ===================== MAIN FETCH ===================== */
function fetchAll() {

    fetch('/portfolio-data')

    .then(res => res.json())

    .then(data => {

        fetchZerodha(data);

        fetchCombined(data);

        fetchManual(data);

    })

    .catch(err => {
        console.error(err);
    });
}


/* ===================== ADD STOCK ===================== */
document.getElementById("add-form").addEventListener("submit", function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    fetch('/add-holding', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(() => {
        // fetchManual();
        fetchAll();
        this.reset();
        $('#symbolSelect-dropdown').val(null).trigger('change');
    });
});


/* ===================== SELECT2 ===================== */
$(document).ready(function() {

    $('#symbolSelect-dropdown').select2({
        placeholder: "Search stocks...",
        minimumInputLength: 1,
        ajax: {
            url: '/search_symbols',
            dataType: 'json',
            delay: 250,
            data: function (params) {
                return { q: params.term || '' };
            },
            processResults: function (data) {
                return { results: data.results || [] };
            }
        }
    });

});

function deleteHolding(id) {

    if (!confirm("Delete this stock?")) return;

    fetch(`/delete-holding/${id}`, {
        method: 'POST'
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") {

            // ✅ Refresh everything properly
            fetchAll();

        } else {
            alert("Delete failed");
        }
    })
    .catch(err => {
        console.error(err);
        alert("Error deleting");
    });
}

/* ===================== AUTO REFRESH ===================== */
setInterval(fetchAll, 10000);

window.onload = fetchAll;

</script>
</html>
