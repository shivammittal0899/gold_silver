<!DOCTYPE html>
<html>
<head>
    <title>Stocks Analysis</title>
</head>
<body>
    <h3>Watchlists</h3>

    <div id="watchlists">
        {% for w in watchlists %}
            <div>
                {{ w[1] }}
                <button onclick="deleteWatchlist({{ w[0] }})">❌</button>
            </div>
        {% endfor %}
    </div>

    <h3>Select Stocks</h3>

    <select id="stockSelect" multiple style="width:300px;">
        {% for s in symbols %}
            <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
    </select>

    <br><br>

    <button onclick="analyze()">📊 Analyze</button>
    <button onclick="openPopup()">➕ Add to Watchlist</button>

    <div id="popup" style="display:none; border:1px solid black; padding:10px;">
    
        <h4>Select Watchlist</h4>

        <select id="watchlistSelect">
            {% for w in watchlists %}
                <option value="{{ w[0] }}">{{ w[1] }}</option>
            {% endfor %}
        </select>

        <br><br>

        <input type="text" id="newWatchlist" placeholder="New watchlist name">

        <br><br>

        <button onclick="saveToWatchlist()">Save</button>
        <button onclick="closePopup()">Cancel</button>

    </div>
</body>
<script>
function getSelectedStocks() {
    let selected = [];
    document.querySelectorAll("#stockSelect option:checked").forEach(o => {
        selected.push(o.value);
    });
    return selected;
}

function openPopup() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function saveToWatchlist() {
    let stocks = getSelectedStocks();
    let wid = document.getElementById("watchlistSelect").value;
    let newName = document.getElementById("newWatchlist").value;

    if (newName) {
        fetch("/create_watchlist", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: newName})
        }).then(() => location.reload());
        return;
    }

    fetch("/add_to_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: wid,
            stocks: stocks
        })
    }).then(() => alert("Saved"));
}

function deleteWatchlist(id) {
    fetch("/delete_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id: id})
    }).then(() => location.reload());
}

function analyze() {
    let stocks = getSelectedStocks();
    alert("Analyze: " + stocks.join(", "));
    // later connect with your analysis engine
}
</script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>

<script>
$(document).ready(function() {
    $('#stockSelect').select2({
        placeholder: "Select stocks"
    });
});
</script>
</html>
