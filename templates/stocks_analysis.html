<!DOCTYPE html>
<html>
<head>
    <title>Stocks Analysis</title>

    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- LOCAL Select2 -->
    <link href="{{ url_for('static', filename='select2/select2.min.css') }}" rel="stylesheet" />
    <script src="{{ url_for('static', filename='select2/select2.min.js') }}"></script>
    <!-- Datatables -->
    <link href="{{ url_for('static', filename='datatables/jquery.datatables.min.css') }}" rel="stylesheet" />
    <script src="{{ url_for('static', filename='datatables/jquery.datatables.min.js') }}"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
    body {
        font-family: Arial;
        margin: 20px;
    }

    h3 {
        margin-top: 20px;
    }

    button {
        padding: 8px 12px;
        margin: 5px;
        cursor: pointer;
        border-radius: 6px;
        border: none;
        background: #3498db;
        color: white;
    }

    button:hover {
        opacity: 0.9;
    }

    .active {
        background: #2ecc71;
    }

    /* Selected container */
    #selectedStocks {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        min-height: 45px;
        background: #f9f9f9;
        margin-bottom: 10px;
    }

    /* Tags */
    .tag {
        display: inline-block;
        background: #2ecc71;
        color: white;
        padding: 5px 10px;
        margin: 4px;
        border-radius: 20px;
        font-size: 13px;
    }

    .tag span {
        margin-left: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    /* Select2 styling */
    .select2-container--default .select2-selection--multiple {
        min-height: 45px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .select2-selection__choice {
        background-color: #3498db !important;
        color: white !important;
        border: none !important;
    }

    table {
        margin-top: 20px;
        width: 100%;
    }
    #chartContainer table{
        margin-top: 0!important;
    }
    </style>
</head>

<body>

<h3>Watchlists</h3>

<div id="watchlists">
    {% for w in watchlists %}
        <div style="display:inline-block; margin:5px;">
            
            <!-- Watchlist Button -->
            <button class="watchlist-btn" data-id="{{ w[0] }}" onclick="toggleWatchlist({{ w[0] }}, this)">
                {{ w[1] }}
            </button>

            <!-- Delete Button -->
            <button 
                onclick="deleteWatchlist({{ w[0] }})"
                style="background:#e74c3c; padding:6px 10px;">
                ✖
            </button>

        </div>
    {% endfor %}
</div>

<h3>Select Stocks</h3>

<!-- ✅ Selected Stocks ABOVE dropdown -->
<div id="selectedStocks"></div>

<select id="stockSelect" multiple style="width:300px;"></select>

<br>
<input 
    type="text" 
    id="manualStocks" 
    placeholder="Enter symbols (space separated e.g. RELIANCE TCS INFY)"
    style="width:300px; padding:8px; border-radius:6px; border:1px solid #ccc; margin-top:10px;"
>
<br>

<button onclick="addStocks()">Add to Watchlist</button>
<button onclick="toggleWatchlistPanel()">➕ Add to Watchlist</button>
<button onclick="analyze()">📊 Analyze</button>
<div id="watchlistPanel" style="display:none; border:1px solid #ddd; padding:12px; margin-top:10px; border-radius:6px; background:#fafafa;">

    <h4>Add to Watchlist</h4>

    <select id="watchlistSelect">
        {% for w in watchlists %}
            <option value="{{ w[0] }}">{{ w[1] }}</option>
        {% endfor %}
    </select>

    <br><br>

    <input type="text" id="newWatchlist" placeholder="Create new watchlist">

    <br><br>

    <button onclick="saveToWatchlist()">Save</button>
</div>

<table id="analysisTable" class="display">
    <thead>
        <tr>
            <th><input type="checkbox" onclick="toggleAll(this)"></th>
            <th>Symbol</th>
            <th>Price</th>
            <th>Return 5D</th>
            <th>Return 15D</th>
            <th>Return 30D</th>
            <th>Return 90D</th>
            <th>Signal 30m</th>
            <th>Signal 60m</th>
            <th>Signal 1d</th>
            <th>TenkanKijun 30m</th>
            <th>TenkanKijun 60m</th>
            <th>TenkanKijun 1d</th>
        </tr>
    </thead>
    <tbody id="stocks_table"></tbody>
</table>

<br>

<button onclick="addCheckedToWatchlist()">➕ Add Selected to Watchlist</button>
<button onclick="deleteSelectedStocks()" style="background:#e74c3c;">
    🗑 Delete Selected
</button>
<div id="chartModal" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    z-index:9999;
">

    <div style="
        background:white;
        width:80%;
        height:80%;
        margin:5% auto;
        padding:10px;
        border-radius:10px;
        position:relative;
    ">
        <button onclick="closeChart()" style="
            position:absolute;
            top:10px;
            right:10px;
            background:red;
        ">✖</button>

        <h3 id="chartTitle"></h3>

        <!-- Chart container -->
        <div id="chartContainer" style="width:100%; height:90%;"></div>
        <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;">

            <!-- Timeframe -->
            <select id="timeframeSelect" onchange="changeTimeframe()">
                <option value="5minute">5m</option>
                <option value="15minute">15m</option>
                <option value="30minute">30m</option>
                <option value="60minute">60m</option>
                <option value="day" selected>1D</option>
            </select>

            <!-- Indicators -->
            <label><input type="checkbox" onchange="toggleIndicator('ichimoku')"> Ichimoku</label>
            <label><input type="checkbox" onchange="toggleIndicator('rsi')"> RSI</label>
            <label><input type="checkbox" onchange="toggleIndicator('vwap')"> VWAP</label>
            <label><input type="checkbox" onchange="toggleIndicator('ema')"> EMA</label>

        </div>
    </div>

</div>
<script>


function loadSelectedStocks(stockList) {
    let select = $('#stockSelect');

    stockList.forEach(s => {
        let option = new Option(s, s, true, true);
        select.append(option);
    });

    select.trigger('change');
}
let activeWatchlist = null;



// 🔥 GET SELECTED
function getSelectedStocks() {
    let selectStocks = $('#stockSelect').val() || [];

    let manualInput = document.getElementById("manualStocks").value.trim();

    let manualStocks = manualInput
        ? manualInput.split(/\s+/).map(s => s.toUpperCase())
        : [];

    // merge + remove duplicates
    let allStocks = [...new Set([...selectStocks, ...manualStocks])];

    return allStocks;
}

// 🔥 UPDATE TAGS
function updateSelectedDisplay() {
    let selected = getSelectedStocks();
    let display = document.getElementById("selectedStocks");
    // 🔥 SAVE TO LOCALSTORAGE HERE
    localStorage.setItem("selectedStocks", JSON.stringify(selected));
    if (selected.length === 0) {
        display.innerHTML = "<span style='color:#888'>No stocks selected</span>";
        return;
    }

    display.innerHTML = "";

    selected.forEach(s => {
        display.innerHTML += `
            <span class="tag">
                ${s} <span onclick="removeStock('${s}')">✖</span>
            </span>
        `;
    });
}

// 🔥 REMOVE STOCK
// function removeStock(symbol) {
//     let selected = getSelectedStocks();
//     selected = selected.filter(s => s !== symbol);

//     $('#stockSelect').val(selected).trigger('change');
// }
function removeStock(symbol) {
    let selected = getSelectedStocks().filter(s => s !== symbol);

    // clear manual input if needed
    let manualInput = document.getElementById("manualStocks").value;
    let manualStocks = manualInput.split(/\s+/).filter(s => s !== symbol);

    document.getElementById("manualStocks").value = manualStocks.join(" ");

    $('#stockSelect').val(selected).trigger('change');
}

// 🔥 ADD STOCKS
function addStocks() {
    let selectedStocks = getSelectedStocks();

    if (selectedStocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    if (!activeWatchlist) {
        alert("Select a watchlist first");
        return;
    }

    // 🔥 STEP 1: VALIDATE
    fetch("/validate_symbols", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({symbols: selectedStocks})
    })
    .then(res => res.json())
    .then(data => {

        let valid = data.valid;
        let invalid = data.invalid;

        if (invalid.length > 0) {
            alert("❌ Invalid symbols: " + invalid.join(", "));
        }

        if (valid.length === 0) {
            alert("No valid stocks to add");
            return;
        }

        // 🔥 STEP 2: ADD ONLY VALID
        fetch('/add_to_watchlist', {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                watchlist_id: activeWatchlist,
                stocks: valid
            })
        })
        .then(() => {
            alert("✅ Added successfully");
            autoLoadWatchlist(activeWatchlist);
        });
    });
}

function createRow(symbol) {
    return `
        <tr>
            <td><input type="checkbox" class="rowCheck" value="${symbol}"></td>
            <td>${symbol}</td>
        </tr>
    `;
}
function fetchAndRenderAnalysis(stocks) {
    if (!stocks || stocks.length === 0) {
        let table = document.getElementById("stocks_table");
        table.innerHTML = "<tr><td>No stocks</td></tr>";
        return;
    }

    fetch("/analyze_stocks", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({symbols: stocks})
    })
    .then(res => res.json())
    .then(data => {
        updateTableWithAnalysis(data);
    });
}
// 🔥 TOGGLE WATCHLIST
function toggleWatchlist(id, btn) {
    let table = document.getElementById("stocks_table");

    
    if (activeWatchlist === id) {
        table.innerHTML = "";
        btn.classList.remove("active");
        activeWatchlist = null;
        localStorage.removeItem("activeWatchlist");
        return;
    }

    activeWatchlist = id;
    localStorage.setItem("activeWatchlist", id);

    document.querySelectorAll("#watchlists button").forEach(b => {
        b.classList.remove("active");
    });

    btn.classList.add("active");

    fetch(`/get_watchlist_items?id=${id}`)
    .then(res => res.json())
    .then(data => {
        fetchAndRenderAnalysis(data);   // 🔥 AUTO ANALYSIS ON LOAD
    });
}
function toggleWatchlistPanel() {
    let panel = document.getElementById("watchlistPanel");

    if (panel.style.display === "none") {
        panel.style.display = "block";
    } else {
        panel.style.display = "none";
    }
}
function proceedSave(validStocks) {
    let selectedWid = document.getElementById("watchlistSelect").value;
    let newName = document.getElementById("newWatchlist").value.trim();

    // 🔥 CREATE NEW
    if (newName) {
        fetch("/create_watchlist", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: newName})
        })
        .then(res => res.json())
        .then(data => {
            let newWid = data.id;

            addWatchlistToUI(newWid, newName);

            let select = document.getElementById("watchlistSelect");
            let option = new Option(newName, newWid, true, true);
            select.add(option);

            return fetch("/add_to_watchlist", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    watchlist_id: newWid,
                    stocks: validStocks
                })
            }).then(() => newWid);
        })
        .then((newWid) => {
            alert("✅ Saved successfully");
            // ✅ reload ONLY if it's already active
            if (activeWatchlist == newWid) {
                autoLoadWatchlist(newWid);
            }

            window.checkedStocksToAdd = null;
            document.getElementById("manualStocks").value = "";
            document.getElementById("newWatchlist").value = "";
        });

        return;
    }

    // 🔥 EXISTING
    if (selectedWid) {
        fetch("/add_to_watchlist", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                watchlist_id: selectedWid,
                stocks: validStocks
            })
        })
        .then(() => {
            alert("✅ Saved successfully");
            if (activeWatchlist == selectedWid) {
                autoLoadWatchlist(selectedWid);
            }

            window.checkedStocksToAdd = null;
            document.getElementById("manualStocks").value = "";
        });
    }
}
function saveToWatchlist() {
    // let stocks = getSelectedStocks();
    let stocks = window.checkedStocksToAdd || getSelectedStocks();

    if (stocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    // 🔥 VALIDATE FIRST
    fetch("/validate_symbols", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({symbols: stocks})
    })
    .then(res => res.json())
    .then(data => {

        let valid = data.valid;
        let invalid = data.invalid;

        if (invalid.length > 0) {
            alert("Invalid symbols: " + invalid.join(", "));
        }

        if (valid.length === 0) {
            alert("No valid stocks to add");
            return;
        }

        // 🔥 CONTINUE WITH VALID ONLY
        proceedSave(valid);
    });
}
function addWatchlistToUI(id, name) {
    let container = document.getElementById("watchlists");

    let div = document.createElement("div");
    div.style.display = "inline-block";
    div.style.margin = "5px";

    div.innerHTML = `
        <button onclick="toggleWatchlist(${id}, this)">
            ${name}
        </button>

        <button onclick="deleteWatchlist(${id})"
            style="background:#e74c3c; padding:6px 10px;">
            ✖
        </button>
    `;

    container.appendChild(div);
}
function autoLoadWatchlist(id) {
    activeWatchlist = id;

    // highlight correct button
    document.querySelectorAll("#watchlists button").forEach(b => {
        b.classList.remove("active");
    });

    let buttons = document.querySelectorAll("#watchlists button");
    buttons.forEach(btn => {
        if (btn.getAttribute("onclick").includes(`(${id},`)) {
            btn.classList.add("active");
        }
    });

    fetch(`/get_watchlist_items?id=${id}`)
    .then(res => res.json())
    .then(data => {
        fetchAndRenderAnalysis(data);   // 🔥 AUTO ANALYSIS ON LOAD
    });
}
function deleteWatchlist(id) {
    if (!confirm("Delete this watchlist?")) return;

    fetch("/delete_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id: id})
    })
    .then(() => {
        // 🔥 Remove exact div
        document.querySelectorAll("#watchlists div").forEach(div => {
            if (div.querySelector("button")?.getAttribute("onclick")?.includes(`(${id},`)) {
                div.remove();
            }
        });

        // 🔥 Reset table if active
        if (activeWatchlist == id) {
            document.getElementById("stocks_table").innerHTML = "<tr><td>Select another watchlist</td></tr>";
            activeWatchlist = null;
        }
    });
}

// 🔥 ANALYZE

function analyze() {
    let stocks = getSelectedStocks();

    if (stocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    fetchAndRenderAnalysis(stocks);
    // 🔥 Remove active watchlist highlight
    document.querySelectorAll("#watchlists button").forEach(b => {
        b.classList.remove("active");
    });

    activeWatchlist = null;
}

function toggleAll(master) {
    document.querySelectorAll(".rowCheck").forEach(cb => {
        cb.checked = master.checked;
    });
}
function getCheckedStocks() {
    let selected = [];

    document.querySelectorAll(".rowCheck:checked").forEach(cb => {
        selected.push(cb.value);
    });

    return selected;
}
function addCheckedToWatchlist() {
    let stocks = getCheckedStocks();

    if (stocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    // reuse your existing panel
    document.getElementById("watchlistPanel").style.display = "block";

    // store temporarily
    window.checkedStocksToAdd = stocks;
}
function deleteSelectedStocks() {
    let stocks = getCheckedStocks();

    if (stocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    if (!activeWatchlist) {
        alert("Select a watchlist first");
        return;
    }

    if (!confirm("Delete selected stocks?")) return;

    fetch("/delete_stocks_from_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: activeWatchlist,
            stocks: stocks
        })
    })
    .then(() => {
        alert("✅ Deleted successfully");
        autoLoadWatchlist(activeWatchlist);
    });
}

function updateTableWithAnalysis(data) {
    let table = document.getElementById("stocks_table");
    // ✅ Proper destroy
    if ($.fn.DataTable.isDataTable('#analysisTable')) {
        $('#analysisTable').DataTable().clear().destroy();
    }
    if (!data || data.length === 0) {
        table.innerHTML = "<tr><td colspan='13'>No data</td></tr>";
        return;
    }

    let html = ""
    data.forEach(d => {
        let sig30 = d.signal_30m || "";
        let sig60 = d.signal_60m || "";
        let sig1d = d.signal_1d || "";

        let color30 =
            sig30.includes("Strong Buy") ? "darkgreen" :
            sig30.includes("Strong Sell") ? "darkred" :
            sig30.includes("Buy") ? "lightgreen" :
            sig30.includes("Sell") ? "red" : "black";
        let color60 =
            sig60.includes("Strong Buy") ? "darkgreen" :
            sig60.includes("Strong Sell") ? "darkred" :
            sig60.includes("Buy") ? "green" :
            sig60.includes("Sell") ? "red" : "black";
        let color1d =
            sig1d.includes("Strong Buy") ? "darkgreen" :
            sig1d.includes("Strong Sell") ? "darkred" :
            sig1d.includes("Buy") ? "green" :
            sig1d.includes("Sell") ? "red" : "black";

        html += `
            <tr>
                <td><input type="checkbox" class="rowCheck" value="${d.symbol}"></td>
                
                <td onclick="openChart('${d.symbol}')" style="cursor:pointer; color:#3498db;">
                    ${d.symbol}
                </td>
                <td>${d.price?.toFixed(2) || '-'}</td>
                <td>${d.ret5?.toFixed(2) || '-'}</td>
                <td>${d.ret15?.toFixed(2) || '-'}</td>
                <td>${d.ret30?.toFixed(2) || '-'}</td>
                <td>${d.ret90?.toFixed(2) || '-'}</td>
                <td style="color:${color30}; font-weight:bold;">${sig30 || '-'}</td>
                <td style="color:${color60}; font-weight:bold;">${sig60 || '-'}</td>
                <td style="color:${color1d}; font-weight:bold;">${sig1d || '-'}</td>
                <td>${d.tenkan_kijun_30m || '-'}</td>
                <td>${d.tenkan_kijun_60m || '-'}</td>
                <td>${d.tenkan_kijun_1d || '-'}</td>
            </tr>
        `;
    });
    table.innerHTML = html;

    initDataTable();
}
let dataTable = null;

function initDataTable() {
    // if (dataTable) {
    //     dataTable.destroy();   // 🔥 destroy old instance
    // }

    dataTable = $('#analysisTable').DataTable({
        pageLength: 25,
        ordering: true,
        searching: true,
        // destroy: true,  // 🔥 safety
        columnDefs: [
            { orderable: false, targets: 0 }
        ]
    });
}
let chart = null;
let candleSeries = null;
let currentSymbol = null;
let currentInterval = "day";
let requestId = 0;

let indicators = {
    ichimoku: false,
    rsi: false,
    vwap: false,
    ema: false
};
function openChart(symbol) {
    currentSymbol = symbol;

    document.getElementById("chartModal").style.display = "block";
    document.getElementById("chartTitle").innerText = symbol;

    loadChart();   // 🔥 delegate everything
}
function loadChart() {
    const currentRequest = ++requestId;

    let container = document.getElementById("chartContainer");
    container.innerHTML = "";

    if (chart) {
        chart.remove();
        chart = null;
    }

    setTimeout(() => {

        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: container.clientHeight,
            timeScale: {
                timeVisible: true,     // 🔥 REQUIRED
                secondsVisible: false  // optional
            }
        });
        chart.applyOptions({
            localization: {
                timeFormatter: time => {
                    const date = new Date(time * 1000);
                    if (currentInterval === "day") {
                        return date.toLocaleDateString();
                    } else {
                        return date.toLocaleTimeString();
                    }
                }
            }
        });

        candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries);
        fetch(`/get_chart_data?symbol=${currentSymbol}&interval=${currentInterval}`)
            .then(res => res.json())
            .then(data => {

                if (currentRequest !== requestId) return;

                if (!data || data.length === 0) return;

                let cleanData = data.filter(d =>
                    d &&
                    typeof d.time !== "undefined" &&
                    Number.isFinite(d.open) &&
                    Number.isFinite(d.high) &&
                    Number.isFinite(d.low) &&
                    Number.isFinite(d.close)
                );

                if (cleanData.length === 0) return;

                // ✅ sort
                cleanData.sort((a, b) => a.time - b.time);

                // ✅ remove duplicates
                const uniqueMap = new Map();
                cleanData.forEach(d => uniqueMap.set(d.time, d));
                const finalData = Array.from(uniqueMap.values());

                candleSeries.setData(finalData);

                if (indicators.ema) addEMA(finalData);
                if (indicators.vwap) addVWAP(finalData);
                if (indicators.ichimoku) addIchimoku(finalData);
                if (indicators.rsi) addRSI(finalData);

                chart.timeScale().fitContent();
            })
            .catch(err => console.error("Chart error:", err));
        
    }, 50);
}
function changeTimeframe() {
    currentInterval = document.getElementById("timeframeSelect").value;
    loadChart();
}
function toggleIndicator(name) {
    indicators[name] = !indicators[name];
    loadChart();
}
function closeChart() {
    document.getElementById("chartModal").style.display = "none";
}

function addEMA(data) {
    let emaSeries = chart.addSeries(LightweightCharts.LineSeries, {
        color: 'blue',
        lineWidth: 2
    });

    emaSeries.setData(
        data
            .filter(d => d.ema != null)
            .map(d => ({ time: d.time, value: d.ema }))
    );
}

function addVWAP(data) {
    let vwapSeries = chart.addSeries(LightweightCharts.LineSeries, {
        color: 'orange',
        lineWidth: 2
    });

    vwapSeries.setData(
        data
            .filter(d => d.vwap != null)
            .map(d => ({ time: d.time, value: d.vwap }))
    );
}

function addIchimoku(data) {
    const tenkan = chart.addSeries(LightweightCharts.LineSeries, { color: "blue" });
    const kijun = chart.addSeries(LightweightCharts.LineSeries, { color: "red" });

    const spanA = chart.addSeries(LightweightCharts.AreaSeries, {
        topColor: "rgba(0, 200, 0, 0.3)",
        bottomColor: "rgba(0, 200, 0, 0.05)",
        lineColor: "green",
        lineWidth: 1
    });

    const spanB = chart.addSeries(LightweightCharts.AreaSeries, {
        topColor: "rgba(200, 0, 0, 0.3)",
        bottomColor: "rgba(200, 0, 0, 0.05)",
        lineColor: "red",
        lineWidth: 1
    });

    tenkan.setData(data.map(d => ({ time: d.time, value: d.tenkan })));
    kijun.setData(data.map(d => ({ time: d.time, value: d.kijun })));

    spanA.setData(data.map(d => ({ time: d.time, value: d.spanA })));
    spanB.setData(data.map(d => ({ time: d.time, value: d.spanB })));
}
function addRSI(data) {
    let rsiSeries = chart.addSeries(LightweightCharts.LineSeries, {
        color: 'purple',
        lineWidth: 2,
        priceScaleId: 'rsi-scale'
    });

    chart.priceScale('rsi-scale').applyOptions({
        scaleMargins: {
            top: 0.8,
            bottom: 0
        }
    });

    rsiSeries.setData(
        data
            .filter(d => d.rsi != null)
            .map(d => ({ time: d.time, value: d.rsi }))
    );
}
</script>
<script>

$(document).ready(function() {

    // 🔹 Select2 init (KEEP THIS ONE ONLY)
    $('#stockSelect').select2({
        placeholder: "Search stocks...",
        minimumInputLength: 1,
        ajax: {
            url: '/search_symbols',
            dataType: 'json',
            delay: 250,
            data: function (params) {
                return { q: params.term };
            },
            processResults: function (data) {
                return { results: data.results };
            },
            cache: true
        }
    });

    // 🔹 On change
    $('#stockSelect').on('change', function() {
        updateSelectedDisplay();
    });

    // 🔹 Restore selected stocks
    let savedStocks = JSON.parse(localStorage.getItem("selectedStocks") || "[]");
    if (savedStocks.length > 0) {
        loadSelectedStocks(savedStocks);
    }
    updateSelectedDisplay();

    // 🔹 Restore active watchlist (KEEP ONLY THIS ONE LOGIC)
    let savedWid = localStorage.getItem("activeWatchlist");

    if (savedWid) {
        let btn = Array.from(document.querySelectorAll(".watchlist-btn"))
            .find(b => b.dataset.id == savedWid);

        if (btn) {
            toggleWatchlist(savedWid, btn);
        }
    }

});
</script>
</body>
</html>
