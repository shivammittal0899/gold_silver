<!DOCTYPE html>
<html>
<head>
    <title>Stocks Analysis</title>
</head>
<body>
    <h3>Watchlists</h3>

    <div id="watchlists">
        {% for w in watchlists %}
            <button onclick="toggleWatchlist({{ w[0] }}, this)">
                {{ w[1] }}
            </button>
        {% endfor %}
    </div>

    <h3>Select Stocks</h3>

    <select id="stockSelect" multiple>
        {% for s in symbols %}
            <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
    </select>

    <button onclick="addStocks()">Add to Watchlist</button>

    <br><br>

    <button onclick="analyze()">📊 Analyze</button>
    <button onclick="openPopup()">➕ Add to Watchlist</button>

    <div id="popup" style="display:none; border:1px solid black; padding:10px;">
    
        <h4>Select Watchlist</h4>

        <select id="watchlistSelect">
            {% for w in watchlists %}
                <option value="{{ w[0] }}">{{ w[1] }}</option>
            {% endfor %}
        </select>

        <br><br>

        <input type="text" id="newWatchlist" placeholder="New watchlist name">

        <br><br>

        <button onclick="saveToWatchlist()">Save</button>
        <button onclick="closePopup()">Cancel</button>

    </div>

    <table border="1" style="margin-top:20px; width:100%;">
        <thead>
            <tr>
                <th>Stock Symbol</th>
            </tr>
        </thead>
        <tbody id="stocks_table">
            <tr><td>Click a watchlist</td></tr>
        </tbody>
    </table>
</body>
<script>

let activeWatchlist = null;

function toggleWatchlist(id, btn) {

    let table = document.getElementById("stocks_table");

    // ✅ SAME BUTTON CLICKED AGAIN → HIDE
    if (activeWatchlist === id) {
        table.innerHTML = "<tr><td>Hidden</td></tr>";
        btn.classList.remove("active");
        activeWatchlist = null;
        return;
    }

    // ✅ NEW BUTTON CLICKED
    activeWatchlist = id;

    // Remove active from all buttons
    document.querySelectorAll("#watchlists button").forEach(b => {
        b.classList.remove("active");
    });

    btn.classList.add("active");

    fetch(`/get_watchlist_items?id=${id}`)
        .then(res => res.json())
        .then(data => {
            table.innerHTML = "";

            if (data.length === 0) {
                table.innerHTML = "<tr><td>No stocks</td></tr>";
                return;
            }

            data.forEach(symbol => {
                table.innerHTML += `<tr><td>${symbol}</td></tr>`;
            });
        });
}

function addStocks() {
    let selected = Array.from(document.getElementById("stockSelect").selectedOptions)
                        .map(o => o.value);

    let wid = activeWatchlist;

    if (!wid) {
        alert("Select a watchlist first");
        return;
    }

    fetch('/add_to_watchlist', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: wid,
            stocks: selected
        })
    })
    .then(res => res.json())
    .then(() => {
        toggleWatchlist(wid, document.querySelector(".active")); // refresh
    });
}

function getSelectedStocks() {
    let selected = [];
    document.querySelectorAll("#stockSelect option:checked").forEach(o => {
        selected.push(o.value);
    });
    return selected;
}

function openPopup() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function saveToWatchlist() {
    let stocks = getSelectedStocks();
    let wid = document.getElementById("watchlistSelect").value;
    let newName = document.getElementById("newWatchlist").value;

    if (newName) {
        fetch("/create_watchlist", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: newName})
        }).then(() => location.reload());
        return;
    }

    fetch("/add_to_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: wid,
            stocks: stocks
        })
    }).then(() => alert("Saved"));
}

function deleteWatchlist(id) {
    fetch("/delete_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id: id})
    }).then(() => location.reload());
}

function analyze() {
    let stocks = getSelectedStocks();
    alert("Analyze: " + stocks.join(", "));
    // later connect with your analysis engine
}
</script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>

<script>
$(document).ready(function() {
    $('#stockSelect').select2({
        placeholder: "Select stocks"
    });
});
</script>
</html>
