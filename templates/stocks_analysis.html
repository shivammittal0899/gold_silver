<!DOCTYPE html>
<html>
<head>
    <title>Stocks Analysis</title>

    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- LOCAL Select2 -->
    <link href="{{ url_for('static', filename='select2/select2.min.css') }}" rel="stylesheet" />
    <script src="{{ url_for('static', filename='select2/select2.min.js') }}"></script>
    <style>
    body {
        font-family: Arial;
        margin: 20px;
    }

    h3 {
        margin-top: 20px;
    }

    button {
        padding: 8px 12px;
        margin: 5px;
        cursor: pointer;
        border-radius: 6px;
        border: none;
        background: #3498db;
        color: white;
    }

    button:hover {
        opacity: 0.9;
    }

    .active {
        background: #2ecc71;
    }

    /* Selected container */
    #selectedStocks {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        min-height: 45px;
        background: #f9f9f9;
        margin-bottom: 10px;
    }

    /* Tags */
    .tag {
        display: inline-block;
        background: #2ecc71;
        color: white;
        padding: 5px 10px;
        margin: 4px;
        border-radius: 20px;
        font-size: 13px;
    }

    .tag span {
        margin-left: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    /* Select2 styling */
    .select2-container--default .select2-selection--multiple {
        min-height: 45px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .select2-selection__choice {
        background-color: #3498db !important;
        color: white !important;
        border: none !important;
    }

    table {
        margin-top: 20px;
        width: 100%;
    }
    </style>
</head>

<body>

<h3>Watchlists</h3>

<div id="watchlists">
    {% for w in watchlists %}
        <div style="display:inline-block; margin:5px;">
            
            <!-- Watchlist Button -->
            <button onclick="toggleWatchlist({{ w[0] }}, this)">
                {{ w[1] }}
            </button>

            <!-- Delete Button -->
            <button 
                onclick="deleteWatchlist({{ w[0] }})"
                style="background:#e74c3c; padding:6px 10px;">
                ✖
            </button>

        </div>
    {% endfor %}
</div>

<h3>Select Stocks</h3>

<!-- ✅ Selected Stocks ABOVE dropdown -->
<div id="selectedStocks"></div>

<select id="stockSelect" multiple style="width:300px;"></select>

<br>
<input 
    type="text" 
    id="manualStocks" 
    placeholder="Enter symbols (space separated e.g. RELIANCE TCS INFY)"
    style="width:300px; padding:8px; border-radius:6px; border:1px solid #ccc; margin-top:10px;"
>
<div id="suggestions" style="border:1px solid #ddd; display:none; max-height:150px; overflow:auto; width:300px;"></div>

<div id="stockError" style="margin-top:5px;"></div>
<br>

<button onclick="addStocks()">Add to Watchlist</button>
<button onclick="toggleWatchlistPanel()">➕ Add to Watchlist</button>
<button onclick="analyze()">📊 Analyze</button>
<div id="watchlistPanel" style="display:none; border:1px solid #ddd; padding:12px; margin-top:10px; border-radius:6px; background:#fafafa;">

    <h4>Add to Watchlist</h4>

    <select id="watchlistSelect">
        {% for w in watchlists %}
            <option value="{{ w[0] }}">{{ w[1] }}</option>
        {% endfor %}
    </select>

    <br><br>

    <input type="text" id="newWatchlist" placeholder="Create new watchlist">

    <br><br>

    <button onclick="saveToWatchlist()">Save</button>
</div>

<table border="1">
    <thead>
        <tr>
            <th>Stock Symbol</th>
        </tr>
    </thead>
    <tbody id="stocks_table">
        <tr><td>Click a watchlist</td></tr>
    </tbody>
</table>

<script>


$(document).ready(function() {
    $('#stockSelect').select2({
        placeholder: "Search stocks...",
        minimumInputLength: 1,
        ajax: {
            url: '/search_symbols',
            dataType: 'json',
            delay: 250,
            data: function (params) {
                return {
                    q: params.term   // search text
                };
            },
            processResults: function (data) {
                return {
                    results: data.results
                };
            },
            cache: true
        }
    });

    // Update selected preview
    $('#stockSelect').on('change', function() {
        updateSelectedDisplay();
    });
});
function loadSelectedStocks(stockList) {
    let select = $('#stockSelect');

    stockList.forEach(s => {
        let option = new Option(s, s, true, true);
        select.append(option);
    });

    select.trigger('change');
}
let activeWatchlist = null;



// 🔥 GET SELECTED
// function getSelectedStocks() {
//     let selectStocks = $('#stockSelect').val() || [];

//     let manualInput = document.getElementById("manualStocks").value.trim();

//     let manualStocks = manualInput
//         ? manualInput.split(/\s+/).map(s => s.toUpperCase())
//         : [];

//     // merge + remove duplicates
//     let allStocks = [...new Set([...selectStocks, ...manualStocks])];

//     return allStocks;
// }
function getSelectedStocks() {
    return $('#stockSelect').val() || [];
}
function selectSuggestion(symbol) {
    addStocksToSelection([symbol]);
    document.getElementById("manualStocks").value = "";
    document.getElementById("suggestions").style.display = "none";
}
function processManualInput(customInput=null) {

    let input = customInput || document.getElementById("manualStocks").value;

    let symbols = input
        .split(/[\s,\n\t,]+/)
        .map(s => s.trim().toUpperCase())
        .filter(s => s.length > 0);

    if (symbols.length === 0) return;

    fetch('/validate_symbols', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({symbols: symbols})
    })
    .then(res => res.json())
    .then(data => {

        addStocksToSelection(data.valid);

        showValidationResult(data.valid, data.invalid);

        document.getElementById("manualStocks").value = "";
        document.getElementById("suggestions").style.display = "none";
    });
}
function addStocksToSelection(symbols) {
    let current = getSelectedStocks();

    let updated = [...new Set([...current, ...symbols])];

    $('#stockSelect').val(updated).trigger('change');
}
function showValidationResult(valid, invalid) {

    let box = document.getElementById("stockError");

    let html = "";

    if (valid.length > 0) {
        html += `<div style="color:green;">✔ Added: ${valid.join(", ")}</div>`;
    }

    if (invalid.length > 0) {
        html += `<div style="color:red;">✖ Invalid: ${invalid.join(", ")}</div>`;
    }

    box.innerHTML = html;

    setTimeout(() => {
        box.innerHTML = "";
    }, 3000);
}

// 🔥 UPDATE TAGS
function updateSelectedDisplay() {
    let selected = getSelectedStocks();
    let display = document.getElementById("selectedStocks");

    if (selected.length === 0) {
        display.innerHTML = "<span style='color:#888'>No stocks selected</span>";
        return;
    }

    display.innerHTML = "";

    selected.forEach(s => {
        display.innerHTML += `
            <span class="tag">
                ${s} <span onclick="removeStock('${s}')">✖</span>
            </span>
        `;
    });
}

// 🔥 REMOVE STOCK
function removeStock(symbol) {
    let selected = getSelectedStocks();
    selected = selected.filter(s => s !== symbol);

    $('#stockSelect').val(selected).trigger('change');
}

// 🔥 ADD STOCKS
function addStocks() {
    let selectedStocks = getSelectedStocks();

    if (selectedStocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    if (!activeWatchlist) {
        alert("Select a watchlist first");
        return;
    }

    fetch('/add_to_watchlist', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: activeWatchlist,
            stocks: selectedStocks
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("Added successfully");
    });
}

// 🔥 TOGGLE WATCHLIST
function toggleWatchlist(id, btn) {
    let table = document.getElementById("stocks_table");

    if (activeWatchlist === id) {
        table.innerHTML = "";
        btn.classList.remove("active");
        activeWatchlist = null;
        return;
    }

    activeWatchlist = id;

    document.querySelectorAll("#watchlists button").forEach(b => {
        b.classList.remove("active");
    });

    btn.classList.add("active");

    fetch(`/get_watchlist_items?id=${id}`)
        .then(res => res.json())
        .then(data => {
            table.innerHTML = "";

            if (data.length === 0) {
                table.innerHTML = "<tr><td>No stocks</td></tr>";
                return;
            }

            data.forEach(symbol => {
                table.innerHTML += `<tr><td>${symbol}</td></tr>`;
            });
        });
}
function toggleWatchlistPanel() {
    let panel = document.getElementById("watchlistPanel");

    if (panel.style.display === "none") {
        panel.style.display = "block";
    } else {
        panel.style.display = "none";
    }
}

function proceedSave(validStocks) {
    let selectedWid = document.getElementById("watchlistSelect").value;
    let newName = document.getElementById("newWatchlist").value.trim();

    // 🔥 CREATE NEW
    if (newName) {
        fetch("/create_watchlist", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: newName})
        })
        .then(res => res.json())
        .then(data => {
            let newWid = data.id;

            addWatchlistToUI(newWid, newName);

            let select = document.getElementById("watchlistSelect");
            let option = new Option(newName, newWid, true, true);
            select.add(option);

            return fetch("/add_to_watchlist", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    watchlist_id: newWid,
                    stocks: validStocks
                })
            }).then(() => newWid);
        })
        .then((newWid) => {
            alert("✅ Saved successfully");
            autoLoadWatchlist(newWid);
            document.getElementById("manualStocks").value = "";
            document.getElementById("newWatchlist").value = "";
        });

        return;
    }

    // 🔥 EXISTING
    if (selectedWid) {
        fetch("/add_to_watchlist", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                watchlist_id: selectedWid,
                stocks: validStocks
            })
        })
        .then(() => {
            alert("✅ Saved successfully");
            autoLoadWatchlist(selectedWid);
            document.getElementById("manualStocks").value = "";
        });
    }
}
function saveToWatchlist() {
    let stocks = getSelectedStocks();

    if (stocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    // 🔥 VALIDATE FIRST
    fetch("/validate_symbols", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({symbols: stocks})
    })
    .then(res => res.json())
    .then(data => {

        let valid = data.valid;
        let invalid = data.invalid;

        if (invalid.length > 0) {
            alert("Invalid symbols: " + invalid.join(", "));
        }

        if (valid.length === 0) {
            alert("No valid stocks to add");
            return;
        }

        // 🔥 CONTINUE WITH VALID ONLY
        proceedSave(valid);
    });
}
function addWatchlistToUI(id, name) {
    let container = document.getElementById("watchlists");

    let div = document.createElement("div");
    div.style.display = "inline-block";
    div.style.margin = "5px";

    div.innerHTML = `
        <button onclick="toggleWatchlist(${id}, this)">
            ${name}
        </button>

        <button onclick="deleteWatchlist(${id})"
            style="background:#e74c3c; padding:6px 10px;">
            ✖
        </button>
    `;

    container.appendChild(div);
}
function autoLoadWatchlist(id) {
    activeWatchlist = id;

    // highlight correct button
    document.querySelectorAll("#watchlists button").forEach(b => {
        b.classList.remove("active");
    });

    let buttons = document.querySelectorAll("#watchlists button");
    buttons.forEach(btn => {
        if (btn.getAttribute("onclick").includes(`(${id},`)) {
            btn.classList.add("active");
        }
    });

    fetch(`/get_watchlist_items?id=${id}`)
        .then(res => res.json())
        .then(data => {
            let table = document.getElementById("stocks_table");
            table.innerHTML = "";

            if (data.length === 0) {
                table.innerHTML = "<tr><td>No stocks</td></tr>";
                return;
            }

            data.forEach(symbol => {
                table.innerHTML += `<tr><td>${symbol}</td></tr>`;
            });
        });
}
function deleteWatchlist(id) {
    if (!confirm("Delete this watchlist?")) return;

    fetch("/delete_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id: id})
    })
    .then(() => {
        // 🔥 Remove exact div
        document.querySelectorAll("#watchlists div").forEach(div => {
            if (div.querySelector("button")?.getAttribute("onclick")?.includes(`(${id},`)) {
                div.remove();
            }
        });

        // 🔥 Reset table if active
        if (activeWatchlist == id) {
            document.getElementById("stocks_table").innerHTML = "<tr><td>Select another watchlist</td></tr>";
            activeWatchlist = null;
        }
    });
}

// 🔥 ANALYZE
function analyze() {
    let stocks = getSelectedStocks();
    alert("Analyze: " + stocks.join(", "));
}
</script>
<script>
let debounceTimer;

document.getElementById("manualStocks").addEventListener("input", function(e) {
    let query = e.target.value.trim();

    clearTimeout(debounceTimer);

    if (query.length < 1) {
        document.getElementById("suggestions").style.display = "none";
        return;
    }

    debounceTimer = setTimeout(() => {
        fetch(`/search_symbols?q=${query}`)
            .then(res => res.json())
            .then(data => {
                let box = document.getElementById("suggestions");

                if (data.results.length === 0) {
                    box.style.display = "none";
                    return;
                }

                box.innerHTML = "";

                data.results.forEach(item => {
                    box.innerHTML += `
                        <div style="padding:6px; cursor:pointer;"
                             onclick="selectSuggestion('${item.id}')">
                             ${item.id}
                        </div>
                    `;
                });

                box.style.display = "block";
            });
    }, 300);
});
document.getElementById("manualStocks").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        processManualInput();
    }
});
document.getElementById("manualStocks").addEventListener("paste", function(e) {
    let pasteData = (e.clipboardData || window.clipboardData).getData("text");

    if (pasteData) {
        e.preventDefault();
        processManualInput(pasteData);
    }
});
document.getElementById("manualStocks").addEventListener("keyup", function(e) {
    let words = e.target.value.split(/\s+/);

    fetch('/validate_symbols', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({symbols: words})
    })
    .then(res => res.json())
    .then(data => {
        console.log("Valid:", data.valid, "Invalid:", data.invalid);
    });
});
</script>
</body>
</html>
