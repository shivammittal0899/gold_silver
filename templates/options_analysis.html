<!-- templates/options_analysis.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Options Analysis Dashboard</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
          rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>

        body {

            background: #f5f7fb;

            padding: 20px;

            font-family: Arial;

        }

        .card-box {

            background: white;

            border-radius: 12px;

            padding: 20px;

            box-shadow: 0px 2px 10px rgba(0,0,0,0.08);

        }

        .top-controls {

            display: grid;

            grid-template-columns: 250px 200px 200px;

            gap: 15px;

            margin-bottom: 20px;

        }

        .select2-container {

            width: 100% !important;

        }

        .loading {

            display: none;

            margin-top: 10px;

            color: blue;

            font-weight: bold;

        }

        table.dataTable tbody tr:hover {

            background-color: #eef4ff !important;

        }

        .bullish {

            color: green;

            font-weight: bold;

        }

        .bearish {

            color: red;

            font-weight: bold;

        }

    </style>

</head>

<body>

<div class="card-box">

    <h2 class="mb-4">

        Options Analysis Dashboard

    </h2>

    <!-- =========================
         FILTERS
    ========================== -->

    <div class="top-controls">

        <!-- INDEX -->
        <div>

            <label class="form-label">

                Select Index

            </label>

            <select id="indexType"
                    class="form-select">

                <option value="NIFTY">

                    NIFTY

                </option>

                <option value="BANKNIFTY">

                    BANKNIFTY

                </option>

            </select>

        </div>

        <!-- TIMEFRAME -->
        <div>

            <label class="form-label">

                Timeframe

            </label>

            <select id="timeframe"
                    class="form-select">

                <option value="minute">

                    1 Minute

                </option>

                <option value="5minute">

                    5 Minute

                </option>

                <option value="30minute">

                    30 Minute

                </option>

            </select>

        </div>

        <!-- BUTTON -->
        <div class="d-flex align-items-end">

            <button class="btn btn-primary w-100"
                    onclick="runAnalysis()">

                Run Analysis

            </button>

        </div>

    </div>

    <div class="loading"
         id="loadingText">

        Fetching Option Analysis...

    </div>

    <!-- =========================
         TABLE
    ========================== -->

    <table id="optionsTable"
           class="display nowrap"
           style="width:100%">

        <thead>

        <tr>

            <th>Symbol</th>

            <th>Strike</th>

            <th>Type</th>

            <th>Expiry</th>

            <th>LTP</th>

            <th>Return6</th>

            <th>High</th>

            <th>Low</th>
            <th>Signal</th>

            <th>Volume Ratio</th>
            <th>OI Change</th>

            <th>Trend</th>
            <th>VWAP</th>
            <th>RSI</th>
            <th>Price Tenkan</th>
        </tr>

        </thead>

        <tbody></tbody>

    </table>
    <table id="optionsTableBank"
           class="display nowrap"
           style="width:100%">
        <thead>
        <tr>
            <th>Symbol</th>
            <th>Strike</th>
            <th>Type</th>
            <th>Expiry</th>
            <th>LTP</th>
            <th>Return6</th>
            <th>High</th>
            <th>Low</th>
            <th>Signal</th>
            <th>Volume Ratio</th>
            <th>OI Change</th>
            <th>Trend</th>
            <th>VWAP</th>
            <th>RSI</th>
            <th>Price Tenkan</th>
        </tr>

        </thead>

        <tbody></tbody>

    </table>

</div>

<script>

    let table;

    // =========================
    // RUN ANALYSIS
    // =========================

    async function runAnalysis() {

        try {

            $("#loadingText").show();

            const index = $("#indexType").val();

            const timeframe = $("#timeframe").val();

            const response = await fetch(

                "/analyze_options",

                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        index: index,
                        timeframe: timeframe
                    })
                }
            );
            const data = await response.json();
            if (!response.ok) {
                console.error(data);
                alert(data.message || "Backend Error");
                return;
            }
            if (!data.nifty || !data.banknifty) {
                console.error(data);
                alert("Invalid response format");
                return;
            }
            console.log(data)
            const niftyData = data.nifty;
            const bankNiftyData = data.banknifty;
            let niftysum = renderTable(niftyData);
            let bankniftysum = renderTable(bankNiftyData);
            console.log(niftyData)

            $("#loadingText").hide();

        }

        catch(error) {

            console.error(error);

            $("#loadingText").hide();

            alert("Error Fetching Analysis");

        }

    }

    // =========================
    // TABLE RENDER
    // =========================
    function table_signal(signal) {
        if (signal == "Strong Buy") {
            return 2
        }
        if (signal == "Buy") {
            return 1
        }
        if (signal == "Strong Sell") {
            return -2
        }
        if (signal == "Sell") {
            return -1
        }
        return 0
    }
    function row_data(item) {

        let signalClass = "";
        if (item.signal === "Strong Buy") {
            signalClass = "bullish";
        }
        else if (item.signal === "Strong Sell") {
            signalClass = "bearish";
        }
        let row = `
            <tr>
                <td>${item.symbol || "-"}</td>
                <td>${item.strike || "-"}</td>
                <td>${item.type || "-"}</td>
                <td>${item.expiry || "-"}</td>
                <td>${item.ltp || "-"}</td>
                <td>${item.ret6 || "-"}</td>
                <td>${item.high || "-"}</td>
                <td>${item.low || "-"}</td>
                <td class = "${signalClass}">${item.signal || "-"}</td>
                <td>${item.volume_ratio || "-"}</td>
                <td>${item.OI_change || "-"}</td>
                <td>${item.trend || "-"}</td>
                <td>${item.vwap || "-"}</td>
                <td>${item.rsi || "-"}</td>
                <td>${item.price_tenkan || "-"}</td>
            </tr>

        `;
        return row
    }
    function renderTable(data) {
        // DESTROY OLD TABLE
        if ($.fn.DataTable.isDataTable('#optionsTable')) {
            $('#optionsTable').DataTable().destroy();
        }
        signal_pe = 0
        signal_ce = 0
        pe_oi = 0
        ce_oi = 0
        // EMPTY TABLE
        $("#optionsTable tbody").empty();

        // APPEND ROWS
        data.forEach(item => {
            if (item.type == "PE") {
                signal_pe += table_signal(item.signal)
                pe_oi += item.OI
            }
            if (item.type == "CE") {
                signal_ce += table_signal(item.signal)
                ce_oi += item.OI
            }
            let row = row_data(item)
            $("#optionsTable tbody").append(row);
        });

        // INIT DATATABLE
        table = $('#optionsTable').DataTable({
            pageLength: 25,
            scrollX: true,
            order: [[2, 'desc']]
        });
        let pcr = round(pe_oi/ce_oi,3)
        return [pcr, pe_oi, ce_oi, signal_pe, signal_ce]
    }
    function renderTableBank(data) {
        // DESTROY OLD TABLE
        if ($.fn.DataTable.isDataTable('#optionsTableBank')) {
            $('#optionsTableBank').DataTable().destroy();
        }
        signal_pe = 0
        signal_ce = 0
        pe_oi = 0
        ce_oi = 0
        // EMPTY TABLE
        $("#optionsTableBank tbody").empty();

        // APPEND ROWS
        data.forEach(item => {
            if (item.type == "PE") {
                signal_pe += table_signal(item.signal)
                pe_oi += int(item.OI)
            }
            if (item.type == "CE") {
                signal_ce += table_signal(item.signal)
                ce_oi += int(item.OI)
            }
            let row = row_data(item)
            $("#optionsTableBank tbody").append(row);
        });

        // INIT DATATABLE
        table = $('#optionsTableBank').DataTable({
            pageLength: 25,
            scrollX: true,
            order: [[2, 'desc']]
        });
        let pcr = pe_oi/ce_oi
        return [pcr, pe_oi, ce_oi, signal_pe, signal_ce]
    }

    // =========================
    // FORMAT NUMBER
    // =========================

    function formatNumber(value) {

        if (value == null) return "-";

        return Intl.NumberFormat('en-IN').format(value);

    }

    // =========================
    // AUTO LOAD
    // =========================

    runAnalysis();

</script>

</body>

</html>
