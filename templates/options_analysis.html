<!-- templates/options_analysis.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Options Analysis</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
          rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>

        body {

            background: #f5f7fb;

            padding: 20px;

            font-family: Arial;

        }

        .card-box {

            background: white;

            border-radius: 10px;

            padding: 20px;

            box-shadow: 0px 2px 10px rgba(0,0,0,0.08);

        }

        .top-controls {

            display: grid;

            grid-template-columns: 1fr 1fr 200px 150px;

            gap: 15px;

            margin-bottom: 20px;

        }

        .select2-container {

            width: 100% !important;

        }

        table.dataTable tbody tr:hover {

            background-color: #f1f5ff !important;

        }

    </style>

</head>

<body>

<div class="card-box">

    <h2 class="mb-4">Options Analysis Dashboard</h2>

    <!-- =========================
         FILTERS
    ========================== -->

    <div class="top-controls">

        <!-- NIFTY OPTIONS -->
        <div>

            <label class="form-label">
                Select NIFTY Options
            </label>

            <select id="niftyOptions"
                    class="form-select"
                    multiple>

            </select>

        </div>

        <!-- BANKNIFTY OPTIONS -->
        <div>

            <label class="form-label">
                Select BANKNIFTY Options
            </label>

            <select id="bankniftyOptions"
                    class="form-select"
                    multiple>

            </select>

        </div>

        <!-- TIMEFRAME -->
        <div>

            <label class="form-label">
                Timeframe
            </label>

            <select id="timeframe"
                    class="form-select">

                <option value="1minute">1 Min</option>

                <option value="5minute">5 Min</option>

                <option value="30minute">30 Min</option>

            </select>

        </div>

        <!-- BUTTON -->
        <div class="d-flex align-items-end">

            <button class="btn btn-primary w-100"
                    onclick="runAnalysis()">

                Analyze

            </button>

        </div>

    </div>

    <!-- =========================
         TABLE
    ========================== -->

    <table id="optionsTable"
           class="display nowrap"
           style="width:100%">

        <thead>

        <tr>

            <th>Symbol</th>

            <th>LTP</th>

            <th>Volume</th>

            <th>OI</th>

            <th>OI Change</th>

            <th>IV</th>

            <th>Delta</th>

            <th>Theta</th>

            <th>Gamma</th>

            <th>Vega</th>

            <th>PCR</th>

            <th>Trend</th>

            <th>Signal</th>

        </tr>

        </thead>

        <tbody></tbody>

    </table>

</div>

<script>

    let table;

    // =========================
    // INIT SELECT2
    // =========================

    $('#niftyOptions').select2({

        placeholder: "Select NIFTY Options"

    });

    $('#bankniftyOptions').select2({

        placeholder: "Select BANKNIFTY Options"

    });

    // =========================
    // SAMPLE DATA
    // Replace with API
    // =========================

    const niftyData = [

        "NIFTY24JUN25000CE",
        "NIFTY24JUN25000PE",
        "NIFTY24JUN25100CE",
        "NIFTY24JUN25100PE"

    ];

    const bankniftyData = [

        "BANKNIFTY24JUN55000CE",
        "BANKNIFTY24JUN55000PE",
        "BANKNIFTY24JUN55100CE",
        "BANKNIFTY24JUN55100PE"

    ];

    // =========================
    // LOAD OPTIONS
    // =========================

    function loadOptions() {

        niftyData.forEach(item => {

            $('#niftyOptions').append(
                new Option(item, item)
            );

        });

        bankniftyData.forEach(item => {

            $('#bankniftyOptions').append(
                new Option(item, item)
            );

        });

    }

    // =========================
    // RUN ANALYSIS
    // =========================

    async function runAnalysis() {

        const nifty = $('#niftyOptions').val();

        const banknifty = $('#bankniftyOptions').val();

        const timeframe = $('#timeframe').val();

        const symbols = [

            ...nifty,

            ...banknifty

        ];

        if (symbols.length === 0) {

            alert("Please select options");

            return;

        }

        try {

            const response = await fetch("/analyze_options", {

                method: "POST",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify({

                    symbols: symbols,

                    timeframe: timeframe

                })

            });

            const data = await response.json();

            renderTable(data);

        }

        catch (error) {

            console.error(error);

            alert("Error fetching analysis");

        }

    }

    // =========================
    // TABLE
    // =========================

    function renderTable(data) {

        if ($.fn.DataTable.isDataTable('#optionsTable')) {

            $('#optionsTable').DataTable().destroy();

        }

        $('#optionsTable tbody').empty();

        data.forEach(item => {

            let row = `

                <tr>

                    <td>${item.symbol || "-"}</td>

                    <td>${item.ltp || "-"}</td>

                    <td>${item.volume || "-"}</td>

                    <td>${item.oi || "-"}</td>

                    <td>${item.oi_change || "-"}</td>

                    <td>${item.iv || "-"}</td>

                    <td>${item.delta || "-"}</td>

                    <td>${item.theta || "-"}</td>

                    <td>${item.gamma || "-"}</td>

                    <td>${item.vega || "-"}</td>

                    <td>${item.pcr || "-"}</td>

                    <td>${item.trend || "-"}</td>

                    <td>${item.signal || "-"}</td>

                </tr>

            `;

            $('#optionsTable tbody').append(row);

        });

        table = $('#optionsTable').DataTable({

            pageLength: 25,

            scrollX: true,

            order: [[1, 'desc']]

        });

    }

    // =========================
    // INIT
    // =========================

    loadOptions();

</script>

</body>

</html>
