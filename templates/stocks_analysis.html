<!DOCTYPE html>
<html>
<head>
    <title>Stocks Analysis</title>
    <style>
    .dropdown {
        position: relative;
        display: inline-block;
    }

    .dropbtn {
        padding: 10px;
        background: #3498db;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        min-width: 220px;
        text-align: left;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        background: white;
        min-width: 250px;
        max-height: 300px;
        overflow-y: auto;
        border: 1px solid #ccc;
        z-index: 1;
    }

    .dropdown-content label {
        display: block;
        padding: 6px;
        cursor: pointer;
    }

    .dropdown-content label:hover {
        background: #f1f1f1;
    }

    .show {
        display: block;
    }

    /* Selected tags */
    .tag {
        display: inline-block;
        background: #2ecc71;
        color: white;
        padding: 4px 8px;
        margin: 3px;
        border-radius: 4px;
        font-size: 12px;
    }
    </style>
</head>
<body>
    <h3>Watchlists</h3>

    <div id="watchlists">
        {% for w in watchlists %}
            <button onclick="toggleWatchlist({{ w[0] }}, this)">
                {{ w[1] }}
            </button>
        {% endfor %}
    </div>

    <h3>Select Stocks</h3>

    <div class="dropdown">
        <button onclick="toggleDropdown()" class="dropbtn" id="dropdownBtn">
            Select Stocks ▼
        </button>

        <div id="dropdownContent" class="dropdown-content">
            {% for s in symbols %}
                <label>
                    <input type="checkbox" value="{{ s }}"> {{ s }}
                </label>
            {% endfor %}
        </div>
    </div>

    <!-- Selected items preview -->
    <div id="selectedStocks" style="margin-top:10px;"></div>

    <button onclick="addStocks()">Add to Watchlist</button>

    <!-- <button onclick="addStocks()">Add to Watchlist</button> -->

    <br><br>

    <button onclick="analyze()">📊 Analyze</button>
    <button onclick="openPopup()">➕ Add to Watchlist</button>

    <div id="popup" style="display:none; border:1px solid black; padding:10px;">
    
        <h4>Select Watchlist</h4>

        <select id="watchlistSelect">
            {% for w in watchlists %}
                <option value="{{ w[0] }}">{{ w[1] }}</option>
            {% endfor %}
        </select>

        <br><br>

        <input type="text" id="newWatchlist" placeholder="New watchlist name">

        <br><br>

        <button onclick="saveToWatchlist()">Save</button>
        <button onclick="closePopup()">Cancel</button>

    </div>

    <table border="1" style="margin-top:20px; width:100%;">
        <thead>
            <tr>
                <th>Stock Symbol</th>
            </tr>
        </thead>
        <tbody id="stocks_table">
            <tr><td>Click a watchlist</td></tr>
        </tbody>
    </table>
</body>
<script>
function toggleDropdown() {
    document.getElementById("dropdownContent").classList.toggle("show");
}

// Close when clicking outside
window.onclick = function(event) {
    if (!event.target.matches('.dropbtn')) {
        document.getElementById("dropdownContent").classList.remove("show");
    }
}

// 🔥 MAIN FUNCTION: Update selected display
document.querySelectorAll("#dropdownContent input").forEach(cb => {
    cb.addEventListener("change", updateSelectedDisplay);
});

function updateSelectedDisplay() {
    let selected = getSelectedStocks();

    let btn = document.getElementById("dropdownBtn");
    let display = document.getElementById("selectedStocks");

    // ✅ Button text (short summary)
    if (selected.length === 0) {
        btn.innerText = "Select Stocks ▼";
    } 
    else if (selected.length <= 2) {
        btn.innerText = selected.join(", ") + " ▼";
    } 
    else {
        btn.innerText = `${selected.length} selected ▼`;
    }

    // ✅ Below dropdown → full list (tags)
    display.innerHTML = "";

    selected.forEach(s => {
        display.innerHTML += `<span class="tag">${s}</span>`;
    });
}

// Helper
function getSelectedStocks() {
    let checkboxes = document.querySelectorAll("#dropdownContent input:checked");
    return Array.from(checkboxes).map(cb => cb.value);
}
</script>
<script>
function addStocks() {
    let selectedStocks = getSelectedStocks();

    if (selectedStocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    if (!activeWatchlist) {
        alert("Select a watchlist first");
        return;
    }

    fetch('/add_to_watchlist', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: activeWatchlist,
            stocks: selectedStocks
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("Added successfully");
    });
}
</script>
<script>

let activeWatchlist = null;

function toggleWatchlist(id, btn) {

    let table = document.getElementById("stocks_table");

    // ✅ SAME BUTTON CLICKED AGAIN → HIDE
    if (activeWatchlist === id) {
        table.innerHTML = "<tr><td>Hidden</td></tr>";
        btn.classList.remove("active");
        activeWatchlist = null;
        return;
    }

    // ✅ NEW BUTTON CLICKED
    activeWatchlist = id;

    // Remove active from all buttons
    document.querySelectorAll("#watchlists button").forEach(b => {
        b.classList.remove("active");
    });

    btn.classList.add("active");

    fetch(`/get_watchlist_items?id=${id}`)
        .then(res => res.json())
        .then(data => {
            table.innerHTML = "";

            if (data.length === 0) {
                table.innerHTML = "<tr><td>No stocks</td></tr>";
                return;
            }

            data.forEach(symbol => {
                table.innerHTML += `<tr><td>${symbol}</td></tr>`;
            });
        });
}

//     });

function openPopup() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function saveToWatchlist() {
    let stocks = getSelectedStocks();
    let wid = document.getElementById("watchlistSelect").value;
    let newName = document.getElementById("newWatchlist").value;

    if (newName) {
        fetch("/create_watchlist", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: newName})
        }).then(() => location.reload());
        return;
    }

    fetch("/add_to_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: wid,
            stocks: stocks
        })
    }).then(() => alert("Saved"));
}

function deleteWatchlist(id) {
    fetch("/delete_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id: id})
    }).then(() => location.reload());
}

function analyze() {
    let stocks = getSelectedStocks();
    alert("Analyze: " + stocks.join(", "));
    // later connect with your analysis engine
}
</script>
