<!DOCTYPE html>
<html>
<head>
    <title>Stocks Analysis</title>

    <!-- ✅ Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet" />

    <!-- ✅ jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- ✅ Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>

    <style>
    body {
        font-family: Arial;
        margin: 20px;
    }

    button {
        padding: 8px 12px;
        margin: 5px;
        cursor: pointer;
    }

    /* Selected tags */
    .tag {
        display: inline-block;
        background: #2ecc71;
        color: white;
        padding: 4px 8px;
        margin: 3px;
        border-radius: 4px;
        font-size: 12px;
    }

    .active {
        background: #3498db;
        color: white;
    }

    /* Improve Select2 */
    .select2-container--default .select2-selection--multiple {
        min-height: 45px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .select2-selection__choice {
        background-color: #3498db !important;
        color: white !important;
        border: none !important;
    }
    </style>
</head>

<body>

<h3>Watchlists</h3>

<div id="watchlists">
    {% for w in watchlists %}
        <button onclick="toggleWatchlist({{ w[0] }}, this)">
            {{ w[1] }}
        </button>
    {% endfor %}
</div>

<h3>Select Stocks</h3>

<select id="stockSelect" multiple style="width:350px;">
    {% for s in symbols %}
        <option value="{{ s }}">{{ s }}</option>
    {% endfor %}
</select>

<!-- Selected preview -->
<div id="selectedStocks" style="margin-top:10px;"></div>

<br>

<button onclick="addStocks()">Add to Watchlist</button>

<br><br>

<button onclick="analyze()">📊 Analyze</button>
<button onclick="openPopup()">➕ Add to Watchlist</button>

<!-- Popup -->
<div id="popup" style="display:none; border:1px solid black; padding:10px; margin-top:10px;">
    <h4>Select Watchlist</h4>

    <select id="watchlistSelect">
        {% for w in watchlists %}
            <option value="{{ w[0] }}">{{ w[1] }}</option>
        {% endfor %}
    </select>

    <br><br>

    <input type="text" id="newWatchlist" placeholder="New watchlist name">

    <br><br>

    <button onclick="saveToWatchlist()">Save</button>
    <button onclick="closePopup()">Cancel</button>
</div>

<table border="1" style="margin-top:20px; width:100%;">
    <thead>
        <tr>
            <th>Stock Symbol</th>
        </tr>
    </thead>
    <tbody id="stocks_table">
        <tr><td>Click a watchlist</td></tr>
    </tbody>
</table>

<script>
let activeWatchlist = null;

// 🔥 INIT SELECT2
$(document).ready(function() {
    $('#stockSelect').select2({
        placeholder: "Search & select stocks",
        width: '350px'
    });

    $('#stockSelect').on('change', updateSelectedDisplay);
});

// 🔥 GET SELECTED
function getSelectedStocks() {
    return $('#stockSelect').val() || [];
}

// 🔥 SHOW TAGS BELOW
function updateSelectedDisplay() {
    let selected = getSelectedStocks();
    let display = document.getElementById("selectedStocks");

    display.innerHTML = "";

    selected.forEach(s => {
        display.innerHTML += `<span class="tag">${s}</span>`;
    });
}

// 🔥 ADD STOCKS
function addStocks() {
    let selectedStocks = getSelectedStocks();

    if (selectedStocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    if (!activeWatchlist) {
        alert("Select a watchlist first");
        return;
    }

    fetch('/add_to_watchlist', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: activeWatchlist,
            stocks: selectedStocks
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("Added successfully");
    });
}

// 🔥 TOGGLE WATCHLIST
function toggleWatchlist(id, btn) {
    let table = document.getElementById("stocks_table");

    if (activeWatchlist === id) {
        table.innerHTML = "";
        btn.classList.remove("active");
        activeWatchlist = null;
        return;
    }

    activeWatchlist = id;

    document.querySelectorAll("#watchlists button").forEach(b => {
        b.classList.remove("active");
    });

    btn.classList.add("active");

    fetch(`/get_watchlist_items?id=${id}`)
        .then(res => res.json())
        .then(data => {
            table.innerHTML = "";

            if (data.length === 0) {
                table.innerHTML = "<tr><td>No stocks</td></tr>";
                return;
            }

            data.forEach(symbol => {
                table.innerHTML += `<tr><td>${symbol}</td></tr>`;
            });
        });
}

// 🔥 POPUP
function openPopup() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function saveToWatchlist() {
    let stocks = getSelectedStocks();
    let wid = document.getElementById("watchlistSelect").value;
    let newName = document.getElementById("newWatchlist").value;

    if (newName) {
        fetch("/create_watchlist", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: newName})
        }).then(() => location.reload());
        return;
    }

    fetch("/add_to_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: wid,
            stocks: stocks
        })
    }).then(() => alert("Saved"));
}

// 🔥 ANALYZE
function analyze() {
    let stocks = getSelectedStocks();
    alert("Analyze: " + stocks.join(", "));
}
</script>

</body>
</html>
