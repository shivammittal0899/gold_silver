<!DOCTYPE html>
<html>
<head>
    <title>Stocks Analysis</title>

    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- LOCAL Select2 -->
    <link href="{{ url_for('static', filename='select2/select2.min.css') }}" rel="stylesheet" />
    <script src="{{ url_for('static', filename='select2/select2.min.js') }}"></script>
    <style>
    body {
        font-family: Arial;
        margin: 20px;
    }

    h3 {
        margin-top: 20px;
    }

    button {
        padding: 8px 12px;
        margin: 5px;
        cursor: pointer;
        border-radius: 6px;
        border: none;
        background: #3498db;
        color: white;
    }

    button:hover {
        opacity: 0.9;
    }

    .active {
        background: #2ecc71;
    }

    /* Selected container */
    #selectedStocks {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        min-height: 45px;
        background: #f9f9f9;
        margin-bottom: 10px;
    }

    /* Tags */
    .tag {
        display: inline-block;
        background: #2ecc71;
        color: white;
        padding: 5px 10px;
        margin: 4px;
        border-radius: 20px;
        font-size: 13px;
    }

    .tag span {
        margin-left: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    /* Select2 styling */
    .select2-container--default .select2-selection--multiple {
        min-height: 45px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .select2-selection__choice {
        background-color: #3498db !important;
        color: white !important;
        border: none !important;
    }

    table {
        margin-top: 20px;
        width: 100%;
    }
    </style>
</head>

<body>

<h3>Watchlists</h3>

<div id="watchlists">
    {% for w in watchlists %}
        <div style="display:inline-block; margin:5px;">
            
            <!-- Watchlist Button -->
            <button onclick="toggleWatchlist({{ w[0] }}, this)">
                {{ w[1] }}
            </button>

            <!-- Delete Button -->
            <button 
                onclick="deleteWatchlist({{ w[0] }})"
                style="background:#e74c3c; padding:6px 10px;">
                ✖
            </button>

        </div>
    {% endfor %}
</div>

<h3>Select Stocks</h3>

<!-- ✅ Selected Stocks ABOVE dropdown -->
<div id="selectedStocks"></div>

<select id="stockSelect" multiple style="width:300px;"></select>

<br><br>

<button onclick="addStocks()">Add to Watchlist</button>
<button onclick="openPopup()">➕ Add to Watchlist</button>
<button onclick="analyze()">📊 Analyze</button>

<!-- Popup -->
<div id="popup" style="display:none; border:1px solid black; padding:10px; margin-top:10px;">
    <h4>Select Watchlist</h4>

    <select id="watchlistSelect">
        {% for w in watchlists %}
            <option value="{{ w[0] }}">{{ w[1] }}</option>
        {% endfor %}
    </select>

    <br><br>

    <input type="text" id="newWatchlist" placeholder="New watchlist name">

    <br><br>

    <button onclick="saveToWatchlist()">Save</button>
    <button onclick="closePopup()">Cancel</button>
</div>

<table border="1">
    <thead>
        <tr>
            <th>Stock Symbol</th>
        </tr>
    </thead>
    <tbody id="stocks_table">
        <tr><td>Click a watchlist</td></tr>
    </tbody>
</table>

<script>


$(document).ready(function() {
    $('#stockSelect').select2({
        placeholder: "Search stocks...",
        minimumInputLength: 1,
        ajax: {
            url: '/search_symbols',
            dataType: 'json',
            delay: 250,
            data: function (params) {
                return {
                    q: params.term   // search text
                };
            },
            processResults: function (data) {
                return {
                    results: data.results
                };
            },
            cache: true
        }
    });

    // Update selected preview
    $('#stockSelect').on('change', function() {
        updateSelectedDisplay();
    });
});
function loadSelectedStocks(stockList) {
    let select = $('#stockSelect');

    stockList.forEach(s => {
        let option = new Option(s, s, true, true);
        select.append(option);
    });

    select.trigger('change');
}
let activeWatchlist = null;



// 🔥 GET SELECTED
function getSelectedStocks() {
    return $('#stockSelect').val() || [];
}

// 🔥 UPDATE TAGS
function updateSelectedDisplay() {
    let selected = getSelectedStocks();
    let display = document.getElementById("selectedStocks");

    if (selected.length === 0) {
        display.innerHTML = "<span style='color:#888'>No stocks selected</span>";
        return;
    }

    display.innerHTML = "";

    selected.forEach(s => {
        display.innerHTML += `
            <span class="tag">
                ${s} <span onclick="removeStock('${s}')">✖</span>
            </span>
        `;
    });
}

// 🔥 REMOVE STOCK
function removeStock(symbol) {
    let selected = getSelectedStocks();
    selected = selected.filter(s => s !== symbol);

    $('#stockSelect').val(selected).trigger('change');
}

// 🔥 ADD STOCKS
function addStocks() {
    let selectedStocks = getSelectedStocks();

    if (selectedStocks.length === 0) {
        alert("Select at least one stock");
        return;
    }

    if (!activeWatchlist) {
        alert("Select a watchlist first");
        return;
    }

    fetch('/add_to_watchlist', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: activeWatchlist,
            stocks: selectedStocks
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("Added successfully");
    });
}

// 🔥 TOGGLE WATCHLIST
function toggleWatchlist(id, btn) {
    let table = document.getElementById("stocks_table");

    if (activeWatchlist === id) {
        table.innerHTML = "";
        btn.classList.remove("active");
        activeWatchlist = null;
        return;
    }

    activeWatchlist = id;

    document.querySelectorAll("#watchlists button").forEach(b => {
        b.classList.remove("active");
    });

    btn.classList.add("active");

    fetch(`/get_watchlist_items?id=${id}`)
        .then(res => res.json())
        .then(data => {
            table.innerHTML = "";

            if (data.length === 0) {
                table.innerHTML = "<tr><td>No stocks</td></tr>";
                return;
            }

            data.forEach(symbol => {
                table.innerHTML += `<tr><td>${symbol}</td></tr>`;
            });
        });
}

// 🔥 POPUP
function openPopup() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function saveToWatchlist() {
    let stocks = getSelectedStocks();
    let wid = document.getElementById("watchlistSelect").value;
    let newName = document.getElementById("newWatchlist").value;

    if (newName) {
        fetch("/create_watchlist", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: newName})
        }).then(() => location.reload());
        return;
    }

    fetch("/add_to_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            watchlist_id: wid,
            stocks: stocks
        })
    }).then(() => alert("Saved"));
}
function deleteWatchlist(id) {

    if (!confirm("Delete this watchlist?")) return;

    fetch("/delete_watchlist", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id: id})
    })
    .then(() => {
        // Remove from UI instantly
        document.querySelectorAll("#watchlists div").forEach(div => {
            if (div.innerHTML.includes(`(${id})`)) {
                div.remove();
            }
        });
    });
}

// 🔥 ANALYZE
function analyze() {
    let stocks = getSelectedStocks();
    alert("Analyze: " + stocks.join(", "));
}
</script>

</body>
</html>
