<!DOCTYPE html>
<html>
<head>
    <title>Kite Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        input[type="number"] {
            max-width: -webkit-fill-available;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        /* GRID SYSTEM FOR RESPONSIVENESS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        /* Card Boxes */
        .box {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.06);
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 12px!important;
            font-size: 18px!important;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        /* Text input */
        input[type="number"] {
            width: 100%;
            padding: 12px!important;
            font-size: 18px!important;
            border-radius: 8px;
            border: 1px solid #aaa;
        }

        /* Logs box */
        #recentLogBox {
            height: 300px!important;
            overflow-y: auto;
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }

        /* Badge */
        #statusBox {
            padding: 10px!important;
            font-size: 18px!important;
            text-align: center;
            border-radius: 8px;
        }
        form {
            padding-top: 20px;
        }
        select {
            min-width: 200px;
            height: 40px;
            border-radius: 10px;
        }
        .select-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .select-row label {
            min-width: 140px;   /* fixed label width */
        }
        .select-row select {
            flex: 1;          /* takes remaining space */
            padding: 8px;
        }
        .minmaxmul, .buttons {
            position: relative;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: 1;
            align-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .buttons button{
            flex: 1;
            width: max-content;
            min-width: 200px;
        }
        .trailingRow {
            margin-top: 20px;
            padding: 15px;
            border: 4px;
            border-radius: 10px;
            background: #ddd;
            box-shadow: rgba(0, 0, 0, 0.19) 0px 10px 20px, rgba(0, 0, 0, 0.23) 0px 6px 6px;
        }
        @media screen and (min-width: 560px) {
            input[type="number"] {
                max-width: max-content;
                width: 15%;
            }
        }
        /* Responsive fix for small screens */
        @media screen and (max-width: 480px) {
            body {
                padding: 10px;
            }

            button {
                font-size: 26px!important;
            }

            input[type="number"] {
                font-size: 26px!important;
            }

            h2 {
                font-size: 22px!important;
            }
            button {
                font-size: 28px!important;
            }

            /* Text input */
            input[type="number"] {
                font-size: 28px!important;
            }
            /* Badge */
            #statusBox {
                font-size: 25px!important;
            }
        }
        .statusBadge {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 6px;
            margin-left: 10px;
        }

        .statusBadge.running {
            background: #d4ffd4;
            color: green;
        }

        .statusBadge.stopped {
            background: #ffd4d4;
            color: red;
        }
        #analysisTable {
            border-collapse: collapse;
            width: 100%;
        }
        #analysisTable th, #analysisTable td {
            padding: 10px;
            text-align: center;
        }
        #analysisTable th {
            background: #222;
            color: white;
        }
    </style>
</head>
<body>
    

    <h2>Strategy Dashboard</h2>

    <p><b>Access Token:</b> {{ token }}</p>
    <button onclick="downloadInstruments()">📥 Download Instruments</button>
    <button onclick="loadSavedInstruments()">📂 Load Instruments</button>
    <div id="statusBox" style="padding:10px; font-size:18px;">
        Checking status...
    </div>
    <form action="/start" method="POST">

        <label>Enter Quantity:</label>
        <input type="number" name="quantity" value="{{ quantity }}" required>


        <br><br>
        <!-- <button style="padding:10px; font-size:18px;">START STRATEGY</button> -->
        <button id="startBtn" style="padding:10px; font-size:18px;">
            Start Strategy
        </button>
    </form>

    <br>

    <form action="/stop" method="GET">
        <!-- <button style="padding:10px; font-size:18px; background:red; color:white;">
            STOP STRATEGY
        </button> -->
        <button id="stopBtn" style="padding:10px; font-size:18px;">
            Stop Strategy
        </button>
    </form>
    

    <br>


    <h3>Trailing Stoploss</h3>

    <div id="trailingContainer">
        <!-- Rows will be loaded dynamically -->
    </div>

    <br>
    <button type="button" onclick="addRow()">➕ Add Row</button>

    <br>

    <!-- <button type="button" onclick="addRow()">➕ Add Row</button> -->
    
    
    
    <a href="/logs">View Live Logs</a>
    <h3>Recent Logs</h3>

    <div id="recentLogBox" 
        style="background:#000; color:#0f0; padding:10px; height:200px; overflow-y:auto; font-family:monospace;">
        Loading...
    </div>

    <h3>📊 Multi-Timeframe Analysis</h3>
    <div style="margin-bottom:10px;">
        <button id="startAnalysisBtn" onclick="startAnalysis()">▶ Start Analysis</button>
        <button id="stopAnalysisBtn" onclick="stopAnalysis()">⛔ Stop Analysis</button>
    </div>
    <table id="analysisTable" border="1" width="100%">
        <thead>
            <tr>
                <th>Analysis</th>
                <th>5 Min</th>
                <th>15 Min</th>
                <th>30 Min</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Price</td>
                <td id="price_5m"></td>
                <td id="price_15m"></td>
                <td id="price_30m"></td>
            </tr>
            <tr>
                <td>Return 6</td>
                <td id="ret6_5m"></td>
                <td id="ret6_15m"></td>
                <td id="ret6_30m"></td>
            </tr>
            <tr>
                <td>Return 12</td>
                <td id="ret12_5m"></td>
                <td id="ret12_15m"></td>
                <td id="ret12_30m"></td>
            </tr>
            <tr>
                <td>Trend</td>
                <td id="trend_5m"></td>
                <td id="trend_15m"></td>
                <td id="trend_30m"></td>
            </tr>
            <tr>
                <td>Last High</td>
                <td id="l_high_5m"></td>
                <td id="l_high_15m"></td>
                <td id="l_high_30m"></td>
            </tr>
            <tr>
                <td>Last Low</td>
                <td id="l_low_5m"></td>
                <td id="l_low_15m"></td>
                <td id="l_low_30m"></td>
            </tr>
            <tr>
                <td>HighLow</td>
                <td id="highlow_5m"></td>
                <td id="highlow_15m"></td>
                <td id="highlow_30m"></td>
            </tr>
            <tr>
                <td>VWAP</td>
                <td id="vwap_5m"></td>
                <td id="vwap_15m"></td>
                <td id="vwap_30m"></td>
            </tr>
            <tr>
                <td>RSI</td>
                <td id="rsi_5m"></td>
                <td id="rsi_15m"></td>
                <td id="rsi_30m"></td>
            </tr>
            <tr>
                <td>ADX</td>
                <td id="adx_5m"></td>
                <td id="adx_15m"></td>
                <td id="adx_30m"></td>
            </tr>
            <tr>
                <td>Volume</td>
                <td id="vol_5m"></td>
                <td id="vol_15m"></td>
                <td id="vol_30m"></td>
            </tr>
            <tr>
                <td>Signal</td>
                <td id="signal_5m"></td>
                <td id="signal_15m"></td>
                <td id="signal_30m"></td>
            </tr>
        </tbody>
    </table>
    <script>
    function loadRecentLogs() {
        fetch('/recent_logs')
            .then(res => res.text())
            .then(data => {
                document.getElementById("recentLogBox").innerHTML = data;
            });
    }

    // refresh every 3 seconds
    setInterval(loadRecentLogs, 3000);
    loadRecentLogs();
    </script>
    <script>
    function downloadInstruments() {
        fetch('/download_instruments')
        .then(res => res.json())
        .then(data => {
            alert("Saved " + data.count + " instruments");
        })
        .catch(err => {
            console.error(err);
            alert("Error downloading instruments");
        });
    }
    let instrumentData = [];

    function loadSavedInstruments() {
        return fetch('/get_saved_instruments')
        .then(res => res.json())
        .then(data => {
            instrumentData = data;
            populateInstrumentDropdowns();
        })
        .catch(err => {
            console.error(err);
            alert("Error loading instruments");
        });
    }
    // auto-update button colors every 2 sec
    function updateStatus() {
        fetch("/strategy_status")
            .then(res => res.text())
            .then(status => {
                const startBtn = document.getElementById("startBtn");
                const stopBtn  = document.getElementById("stopBtn");
                const statusBox = document.getElementById("statusBox");
                if (status === "running") {

                    statusBox.innerHTML = "🟢 Strategy is RUNNING";
                    startBtn.style.background = "green";
                    startBtn.style.color = "white";

                    stopBtn.style.background = "#ffcccc";  // light red
                    stopBtn.style.color = "black";
                } else {
                    statusBox.innerHTML = "🔴 Strategy is STOPPED";
                    startBtn.style.background = "#d9ffd9"; // light green background
                    startBtn.style.color = "black";

                    stopBtn.style.background = "red";
                    stopBtn.style.color = "white";
                }
            });
    }

    setInterval(updateStatus, 2000);
    updateStatus();
    </script>
    
    <script>

    function populateInstrumentDropdowns() {
        let selects = document.querySelectorAll('[name="instrument"]');

        selects.forEach(select => {

            // ✅ Save current selected value
            let selected = select.value;

            select.innerHTML = '<option value="">Select Instrument</option>';

            instrumentData.forEach(inst => {
                let option = document.createElement("option");
                option.value = inst.tradingsymbol;
                option.text = inst.tradingsymbol + " (" + inst.name + ")";

                // ✅ Restore selection
                if (inst.tradingsymbol === selected) {
                    option.selected = true;
                }

                select.appendChild(option);
            });
        });
    }

    // 🔄 Load rows from backend (works across devices)
    function loadRows() {
        fetch('/get_trailing')
        .then(res => res.json())
        .then(data => {
            let container = document.getElementById("trailingContainer");
            container.innerHTML = "";
            data.forEach(row => {
                container.appendChild(createRow(row));
            });
            if (instrumentData.length > 0) {
                populateInstrumentDropdowns();
            }
        });
    }


    // 🧱 Create row UI
    function createRow(data = {}) {

        let row = document.createElement("div");
        row.className = "trailingRow";
        row.setAttribute("data-id", data.id || "");
        let tf = data.timeframe || "5m";
        let statusText = data.running == 1 ? "🟢 Running" : "🔴 Stopped";
        let statusClass = data.running == 1 ? "running" : "stopped";
        row.innerHTML = `
            <div class="select-row">
                <div class="select_box">
                    <label>Instrument:</label>
                    <select name="instrument">
                        ${data.instrument ? `<option value="${data.instrument}" selected>${data.instrument}</option>` : '<option value="">Select Instrument</option>'}
                    </select>
                </div>
                <div class="select_box">
                    <label>Select Indicator:</label>
                    <select name="indicator">
                        <option value="senkou_a" ${data.indicator=="senkou_a"?"selected":""}>Senkou A</option>
                        <option value="senkou_b" ${data.indicator=="senkou_b"?"selected":""}>Senkou B</option>
                        <option value="tenkan" ${data.indicator=="tenkan"?"selected":""}>Tenkan</option>
                        <option value="kijun" ${data.indicator=="kijun"?"selected":""}>Kijun</option>
                        <option value="highlow" ${data.indicator=="highlow"?"selected":""}>HighLow</option>
                    </select>
                </div>
                <div class="select_box">
                    <label>Timeframe:</label>
                    <select name="timeframe">
                        <option value="5m" ${tf=="5m"?"selected":""}>5 Min</option>
                        <option value="15m" ${tf=="15m"?"selected":""}>15 Min</option>
                        <option value="30m" ${tf=="30m"?"selected":""}>30 Min</option>
                        <option value="1h" ${tf=="1h"?"selected":""}>1 Hour</option>
                    </select>
                </div>
            </div>

            <div class="minmaxmul">
                <label>Quantity:</label>
                <input type="number" name="quantity" value="${data.qty || ''}">
                <label>Min:</label>
                <input type="number" name="min" value="${data.min || ''}">
                <label>Multiplier:</label>
                <input type="number" step="0.01" name="multiplier" value="${data.multiplier || ''}">
                <label>Max:</label>
                <input type="number" name="max" value="${data.max || ''}">
            </div>

            <div class="buttons">
                <button onclick="startRow(this)">▶ Start</button>
                <button onclick="stopRow(this)">⛔ Stop</button>
                <button onclick="removeRow(this)">❌ Remove</button>
                <span class="statusBadge ${statusClass}">${statusText}</span>
            </div>
        `;

        // highlight running rows
        if (data.running == 1) {
            row.style.background = "#e6ffe6";
        }

        return row;
    }


    // ➕ Add new empty row (not saved yet)
    function addRow() {
        let container = document.getElementById("trailingContainer");
        let row = createRow();
        container.appendChild(row);

        // populate dropdown for new row
        let select = row.querySelector('[name="instrument"]');

        if (instrumentData.length > 0) {
            instrumentData.forEach(inst => {
                let option = document.createElement("option");
                option.value = inst.tradingsymbol;
                option.text = inst.tradingsymbol + " (" + inst.name + ")";
                select.appendChild(option);
            });
        }
    }


    // ▶ START (save + run)
    function startRow(btn) {
        let row = btn.closest(".trailingRow");
        // ✅ Disable button immediately
        btn.disabled = true;
        
        let data = {
            id: row.getAttribute("data-id"),   // ✅ (explained below)
            instrument: row.querySelector('[name="instrument"]').value,  // ✅ NEW
            indicator: row.querySelector('[name="indicator"]').value,
            timeframe: row.querySelector('[name="timeframe"]').value,
            qty: row.querySelector('[name="quantity"]').value,
            min: row.querySelector('[name="min"]').value,
            multiplier: row.querySelector('[name="multiplier"]').value,
            max: row.querySelector('[name="max"]').value
        };
        if (!data.instrument || !data.min || !data.multiplier) {
            alert("Fill all fields");
            btn.disabled = false;   // ✅ re-enable if validation fails
            return;
        }
        let badge = row.querySelector(".statusBadge");
        badge.innerText = "🟢 Running";
        badge.className = "statusBadge running";
        fetch('/start_trailing_row', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        // .then(res => res.json())
        .then(res => {
            if (!res.ok) throw new Error("Server error");
            return res.json();
        })
        .then(res => {
            row.setAttribute("data-id", res.id);   // ✅ IMPORTANT FIX
            loadRows();
        })
        .catch(err => {
            console.error(err);
            alert("Error: " + err.message);
        })
        .finally(() => {
            btn.disabled = false;   // ✅ ALWAYS re-enable
        });
        // .then(res => {
        //     row.setAttribute("data-id", res.id);
        //     row.style.background = "#e6ffe6";
        // });
    }


    // ⛔ STOP
    function stopRow(btn) {
        let row = btn.closest(".trailingRow");
        let id = row.getAttribute("data-id");
        let badge = row.querySelector(".statusBadge");
        badge.innerText = "🔴 Stopped";
        badge.className = "statusBadge stopped";
        if (!id) return alert("Not started");

        fetch('/stop_trailing_row', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id})
        })
        .then(() => {
            loadRows(); // 🔥 reload from backend
        });
        // .then(() => {
        //     row.style.background = "#ffe6e6";
        // });
    }
    

    // ❌ REMOVE (delete from DB)
    function removeRow(btn) {
        let row = btn.closest(".trailingRow");
        let id = row.getAttribute("data-id");

        if (id) {
            fetch('/delete_trailing_row', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            })
            .then(() => {
                loadRows(); // 🔥 reload after delete
                // row.remove(); // remove AFTER backend delete
            });
        } else {
            row.remove(); // local row only
        }
    }


    // 🔥 Start
    function startAnalysis() {
        fetch('/start_analysis')
        .then(res => res.json())
        .then(data => {
            console.log(data);
            document.getElementById("startAnalysisBtn").disabled = true;
            document.getElementById("stopAnalysisBtn").disabled = false;
        });
    }

    // 🔥 Stop
    function stopAnalysis() {
        fetch('/stop_analysis')
        .then(res => res.json())
        .then(data => {
            console.log(data);
            document.getElementById("startAnalysisBtn").disabled = false;
            document.getElementById("stopAnalysisBtn").disabled = true;
        });
    }

    // 🔥 Color Signal
    function colorSignal(cell, value) {
        cell.style.fontWeight = "bold";

        if (value === "BUY") {
            cell.style.color = "green";
            cell.style.background = "#e6ffe6";
        }
        else if (value === "SELL") {
            cell.style.color = "red";
            cell.style.background = "#ffe6e6";
        }
        else {
            cell.style.color = "gray";
            cell.style.background = "#f0f0f0";
        }
    }

    // 🔥 Update Table
    function updateAnalysis(data) {
        ["5m", "15m", "30m"].forEach(tf => {
            

            document.getElementById(`price_${tf}`).innerText = data[tf]?.price || "";
            let ret6Cell = document.getElementById(`ret6_${tf}`);
            let ret6Value = data[tf]?.ret6 || "";
            ret6Cell.innerText = ret6Value;
            let ret12Cell = document.getElementById(`ret12_${tf}`);
            let ret12Value = data[tf]?.ret12 || "";
            ret12Cell.innerText = ret12Value;
            document.getElementById(`trend_${tf}`).innerText = data[tf]?.trend || "";
            document.getElementById(`l_high_${tf}`).innerText = data[tf]?.l_high || "";
            document.getElementById(`l_low_${tf}`).innerText = data[tf]?.l_low || "";
            document.getElementById(`highlow_${tf}`).innerText = data[tf]?.highlow || "";
            document.getElementById(`vwap_${tf}`).innerText = data[tf]?.vwap || "";
            document.getElementById(`rsi_${tf}`).innerText = data[tf]?.rsi || "";
            document.getElementById(`adx_${tf}`).innerText = data[tf]?.adx || "";
            document.getElementById(`vol_${tf}`).innerText = data[tf]?.volume || "";

            let signalCell = document.getElementById(`signal_${tf}`);
            let signalValue = data[tf]?.signal || "";

            signalCell.innerText = signalValue;
            colorSignal(signalCell, signalValue);
        });
    }

    // 🔥 Fetch Data
    function loadAnalysis() {
        fetch('/get_analysis')
        .then(res => res.json())
        .then(data => {
            updateAnalysis(data);
        });
    }

    // 🔥 Auto refresh UI (lightweight)
    setInterval(loadAnalysis, 2000);

    // 🔄 Load on page open
    // loadRows();
    window.onload = async function () {
        await loadSavedInstruments();
        loadRows();
    };
    
    </script>
