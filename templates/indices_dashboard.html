<!DOCTYPE html>
<html>
<head>

    <title>Nifty Master Dashboard</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Datatables -->
    <link href="{{ url_for('static', filename='datatables/jquery.datatables.min.css') }}" rel="stylesheet" />
    <script src="{{ url_for('static', filename='datatables/jquery.datatables.min.js') }}"></script>
    

    <style>

        body{
            font-family:Arial;
            margin:20px;
            background:#f5f5f5;
        }

        h2{
            margin-bottom:20px;
        }

        button{
            padding:10px 15px;
            border:none;
            border-radius:8px;
            background:#3498db;
            color:white;
            cursor:pointer;
            margin-bottom:15px;
        }

        table{
            width:100%;
        }

        .yes{
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

<h2>Nifty Index Master Dashboard</h2>

<button onclick="refreshIndices()">
    🔄 Refresh Indices
</button>

<table id="indicesTable" class="display nowrap">

    <thead>

        <tr>

            <th>Symbol</th>
            <th>Company</th>
            <th>Industry</th>
            <th>Indices</th>
            <th>Index Count</th>
            <th>Institutional Strength</th>

            <th>Large Cap</th>
            <th>Mid Cap</th>
            <th>Small Cap</th>

            <th>Banking</th>
            <th>IT</th>
            <th>Pharma</th>
            <th>Auto</th>
            <th>Energy</th>
            <th>Infra</th>
            <th>Consumption</th>
            <th>Realty</th>

            <th>Momentum</th>
            <th>Quality</th>
            <th>Value</th>
            <th>Low Volatility</th>
            <th>Alpha</th>
            <th>ESG</th>

            <th>Defence</th>
            <th>Chemical</th>
            <th>Rural</th>
            <th>IPO</th>

        </tr>

    </thead>

    <tbody></tbody>

</table>

<script>

let table = null;

function yesNo(v){

    if(v === true){
        return '<span class="yes">YES</span>';
    }

    return '-';
}

function loadTable(){

    fetch('/get_indices_data')
    .then(res => res.json())
    .then(data => {

        let html = '';

        data.forEach(d => {

            html += `

            <tr>

                <td>${d.Symbol || ''}</td>
                <td>${d['Company Name'] || ''}</td>
                <td>${d.Industry || ''}</td>
                <td>${d.Index || ''}</td>
                <td>${d['Index Count'] || ''}</td>
                <td>${d['Institutional Strength'] || ''}</td>

                <td>${yesNo(d['Large Cap'])}</td>
                <td>${yesNo(d['Mid Cap'])}</td>
                <td>${yesNo(d['Small Cap'])}</td>

                <td>${yesNo(d['Banking'])}</td>
                <td>${yesNo(d['IT'])}</td>
                <td>${yesNo(d['Pharma'])}</td>
                <td>${yesNo(d['Auto'])}</td>
                <td>${yesNo(d['Energy'])}</td>
                <td>${yesNo(d['Infra'])}</td>
                <td>${yesNo(d['Consumption'])}</td>
                <td>${yesNo(d['Realty'])}</td>

                <td>${yesNo(d['Momentum'])}</td>
                <td>${yesNo(d['Quality'])}</td>
                <td>${yesNo(d['Value'])}</td>
                <td>${yesNo(d['Low Volatility'])}</td>
                <td>${yesNo(d['Alpha'])}</td>
                <td>${yesNo(d['ESG'])}</td>

                <td>${yesNo(d['Defence'])}</td>
                <td>${yesNo(d['Chemical'])}</td>
                <td>${yesNo(d['Rural'])}</td>
                <td>${yesNo(d['IPO'])}</td>

            </tr>

            `;

        });

        $('#indicesTable tbody').html(html);

        if(table){
            table.destroy();
        }

        table = $('#indicesTable').DataTable({

            pageLength:50,

            scrollX:true,

            scrollY:'75vh',

            scrollCollapse:true,

            stateSave:true

        });

    });

}

function refreshIndices(){

    fetch('/refresh_indices')
    .then(res => res.json())
    .then(data => {

        alert("Updated " + data.rows + " rows");

        loadTable();

    });

}

loadTable();

</script>

</body>
</html>
